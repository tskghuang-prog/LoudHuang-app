function FinReportPg({txns, community, auth, pdfFormats, setPdfFormats, flash, setModal}){const[tab,setTab]=useState("view");const[vd,setVd]=useState(td().slice(0,7));const y=parseInt(vd.slice(0,4)),m=parseInt(vd.slice(5,7));

const inc=mt.filter(t=>t.type==="income"),exp=mt.filter(t=>t.type==="expense");
const tI=inc.reduce((s,t)=>s+(t.amount||0),0),tE=exp.reduce((s,t)=>s+(t.amount||0),0);
const ViewPDFModal=()=><div style={{padding:20,background:"#fff",minHeight:"70vh",boxSizing:"border-box"}}><div style={{textAlign:"center",marginBottom:24}}><h2 style={{margin:0,fontSize:20}}>{((community&&community.name)||auth.communityName)}</h2><h3 style={{margin:"8px 0",fontSize:16,color:"#666",fontWeight:"normal"}}>{y} 年 {m} 月 財務報表</h3></div><div style={{display:"grid",gap:20,gridTemplateColumns:"1fr"}}><div style={{border:"1px solid #ccc",padding:12}}><div style={{fontWeight:700,borderBottom:"2px solid #333",marginBottom:8,paddingBottom:4}}>一、資產負債簡表</div><TRow label="流動資產" value={"$"+(tI-tE>0?tI-tE:0).toLocaleString()}/><TRow label="負債" value="$0" last/></div><div style={{border:"1px solid #ccc",padding:12}}><div style={{fontWeight:700,borderBottom:"2px solid #333",marginBottom:8,paddingBottom:4}}>二、收支明細表</div><TRow label="本月收入" value={"$"+tI.toLocaleString()}/><TRow label="本月支出" value={"$"+tE.toLocaleString()}/><TRow label="本月結餘" value={"$"+(tI-tE).toLocaleString()} last/></div><div style={{border:"1px solid #ccc",padding:12}}><div style={{fontWeight:700,borderBottom:"2px solid #333",marginBottom:8,paddingBottom:4}}>三、欠繳明細</div><div style={{fontSize:13,color:"#666",padding:"10px 0",textAlign:"center"}}>本月無欠繳戶別</div></div><div style={{border:"1px solid #ccc",padding:12}}><div style={{fontWeight:700,borderBottom:"2px solid #333",marginBottom:8,paddingBottom:4}}>四、銀行餘額</div><div style={{fontSize:13,color:"#666",padding:"10px 0",textAlign:"center"}}>請參照存摺影本</div></div></div><Btn full onClick={()=>setModal(null)} style={{marginTop:24}}>關閉閱覽</Btn></div>;
const handleFileUpload=(e)=>{const file=e.target.files[0];if(!file)return;if(file.type!=="application/pdf"){flash("請上傳 PDF 檔案","err");return}const r=new FileReader();r.onload=ev=>{setPdfFormats([...pdfFormats,{id:uid(),name:file.name,date:td(),data:ev.target.result}]);flash("格式已上傳")};r.readAsDataURL(file)};
return<><div style={{display:"flex",gap:8,marginBottom:16,background:P.bgW,borderRadius:10,padding:4}}><button onClick={()=>setTab("view")} style={{...Z.tabBtn,...(tab==="view"?Z.tabAct:{})}}>財報閱覽</button><button onClick={()=>setTab("upload")} style={{...Z.tabBtn,...(tab==="upload"?Z.tabAct:{})}}>格式上傳</button></div>
{tab==="view"&&<><Card><Lb>選擇瀏覽月份</Lb><Inp type="month" value={vd} onChange={e=>setVd(e.target.value)}/></Card><Card style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:48,marginBottom:16}}>📊</div><div style={{fontSize:16,fontWeight:700}}>{y}年{m}月 系統生成財報</div><div style={{fontSize:13,color:P.txt2,marginTop:8,marginBottom:24}}>基於系統收支紀錄自動生成之四大區塊報表</div><Btn onClick={()=>{setModal(<ViewPDFModal/>)}}>🔍 放大閱覽財報</Btn></Card></>}
{tab==="upload"&&<><Card><CT sub="上傳自訂的空白財報格式(僅限PDF)">財報格式管理</CT><label style={{display:"block",border:"2px dashed "+P.bdr,borderRadius:14,padding:32,textAlign:"center",cursor:"pointer",background:P.bgW}}><div style={{fontSize:40,marginBottom:12}}>📄</div><div style={{fontSize:15,fontWeight:700,color:P.priD}}>點擊上傳 PDF 格式</div><input type="file" accept="application/pdf" style={{display:"none"}} onChange={handleFileUpload}/></label></Card>{pdfFormats.map(p=><Card key={p.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,color:P.blu}}>{p.name}</div><div style={{fontSize:12,color:P.txt3}}>{p.date}</div></div><Btn sm v="out" onClick={()=>{setPdfFormats(pdfFormats.filter(x=>x.id!==p.id));flash("已刪除")}} style={{color:P.red,borderColor:P.red}}>刪除</Btn></div></Card>)}{!pdfFormats.length&&<Empty icon="📂" text="尚未上傳任何格式"/>}</>}</>}

function FinSet({banks,setBanks,inCats,setInCats,exCats,setExCats,flash}){const[tab,setTab]=useState("bank");const[nb,setNb]=useState({bank:"",branch:"",account:"",purpose:""});const cc=(nb.bank+nb.branch+nb.account+nb.purpose).length;return<><div style={{display:"flex",gap:6,marginBottom:16,background:P.bgW,borderRadius:10,padding:4}}>{[["bank","銀行帳戶"],["inc","收入項目"],["exp","支出項目"]].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{...Z.tabBtn,...(tab===k?Z.tabAct:{})}}>{l}</button>)}</div>{tab==="bank"&&<><Card><CT sub={banks.length+"/10"}>新增帳戶</CT><Lb>銀行</Lb><Inp value={nb.bank} onChange={e=>setNb({...nb,bank:e.target.value})}/><Lb>分行</Lb><Inp value={nb.branch} onChange={e=>setNb({...nb,branch:e.target.value})}/><Lb>帳號</Lb><Inp value={nb.account} onChange={e=>setNb({...nb,account:e.target.value})}/><Lb>用途</Lb><Inp value={nb.purpose} onChange={e=>setNb({...nb,purpose:e.target.value})}/><div style={{fontSize:12,color:cc>50?P.red:P.txt3,marginBottom:12}}>{cc}/50字元</div><Btn full onClick={()=>{if(cc>50){flash("超過50字","err");return}if(banks.length>=10){flash("上限10組","err");return}if(!nb.bank||!nb.account){flash("請填寫必填欄位","err");return}setBanks([...banks,{...nb,id:uid()}]);setNb({bank:"",branch:"",account:"",purpose:""});flash("已新增帳戶")}}>新增帳戶</Btn></Card>{banks.map(b=><Card key={b.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,color:P.priD}}>{b.bank} {b.branch}</div><div style={{fontSize:13,color:P.txt2,marginTop:2}}>...{b.account.slice(-5)} · {b.purpose}</div></div><Btn sm v="out" onClick={()=>setBanks(banks.filter(x=>x.id!==b.id))} style={{color:P.red,borderColor:P.red}}>刪除</Btn></div></Card>)}</>}{tab==="inc"&&<CatEd cats={inCats} setCats={setInCats} max={20} color={P.grn} label="收入" flash={flash}/>}{tab==="exp"&&<CatEd cats={exCats} setCats={setExCats} max={40} color={P.red} label="支出" flash={flash}/>}</>}

function CatEd({cats,setCats,max,color,label,flash}){const[n,sn]=useState("");return<><Card><CT color={color} sub={cats.length+"/"+max}>{label}項目設定</CT><div style={{display:"flex",gap:10}}><Inp value={n} onChange={e=>sn(e.target.value)} placeholder={"輸入"+label+"項目名稱"} style={{flex:1,marginBottom:0}}/><Btn onClick={()=>{if(!n)return;if(cats.length>=max){flash("上限"+max,"err");return}setCats([...cats,{id:uid(),name:n}]);sn("");flash("已新增")}}>新增</Btn></div></Card>{cats.map(c=><Card key={c.id} style={{padding:"16px 20px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,color,fontSize:15}}>{c.name}</span><Btn sm v="out" onClick={()=>setCats(cats.filter(x=>x.id!==c.id))} style={{color:P.red,borderColor:P.red}}>刪除</Btn></div></Card>)}</>}

function TxRec({type,banks,inCats,exCats,txns,setTxns,flash}){const isI=type==="income",cats=isI?inCats:exCats,clr=isI?P.grn:P.red;const[f,sf]=useState({acctId:"",cat:"",date:td(),amount:"",note:""});const save=()=>{if(!f.acctId||!f.cat||!f.amount){flash("請完整填寫","err");return}setTxns([{...f,id:uid(),type,amount:parseFloat(f.amount),ts:Date.now()},...txns]);sf({acctId:"",cat:"",date:td(),amount:"",note:""});flash("已記錄")};const list=txns.filter(t=>t.type===type);return<><Card style={{borderTop:"4px solid "+clr}}><CT color={clr}>{isI?"👛📥 記錄收入":"👛📤 記錄支出"}</CT><Lb>帳戶</Lb><Sel value={f.acctId} onChange={e=>sf({...f,acctId:e.target.value})}><option value="">請選擇帳戶</option>{banks.map(b=><option key={b.id} value={b.id}>...{b.account.slice(-5)} ({b.purpose})</option>)}</Sel><Lb>類別</Lb><Sel value={f.cat} onChange={e=>sf({...f,cat:e.target.value})}><option value="">請選擇類別</option>{cats.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</Sel><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Lb>日期</Lb><Inp type="date" value={f.date} onChange={e=>sf({...f,date:e.target.value})}/></div><div><Lb>金額</Lb><Inp type="number" value={f.amount} onChange={e=>sf({...f,amount:e.target.value})}/></div></div><Lb>備註</Lb><Txa value={f.note} onChange={e=>sf({...f,note:e.target.value})}/><Btn full style={{background:clr,marginTop:8}} onClick={save}>儲存紀錄</Btn></Card>{list.map(t=><Card key={t.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700}}>{t.cat}</div><div style={{fontSize:12,color:P.txt3,marginTop:4}}>{fmt(t.date)}{t.note&&" · "+t.note}</div></div><div style={{fontSize:18,fontWeight:900,color:clr}}>{isI?"+":"-"}${t.amount&&t.amount.toLocaleString()}</div></div></Card>)}{!list.length&&<Empty icon={isI?"👛":"💸"} text="尚無記錄"/>}</>}

function RepPg({repairs,setRepairs,pendRep,setPendRep,flash,setModal}){const[tab,setTab]=useState("a");return<><div style={{display:"flex",gap:8,marginBottom:16,background:P.bgW,borderRadius:10,padding:4}}><button onClick={()=>setTab("a")} style={{...Z.tabBtn,...(tab==="a"?Z.tabAct:{})}}>修繕中 ({repairs.length})</button><button onClick={()=>setTab("p")} style={{...Z.tabBtn,...(tab==="p"?Z.tabAct:{})}}>待修繕 ({pendRep.length})</button></div>{tab==="a"&&<><Btn full onClick={()=>setModal(<RpForm onSave={r=>{setRepairs([...repairs,{...r,id:uid(),currentStage:0,createdAt:td()}]);setModal(null);flash("已新增")}} onClose={()=>setModal(null)}/>)} style={{marginBottom:16}}>＋新增修繕專案</Btn>{repairs.map(r=>{const pct=r.stages>0?((r.currentStage||0)/r.stages)*100:0;return<Card key={r.id}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontWeight:700}}>{r.title}</span><Tag bg={pct>=100?P.grnL:P.ornL} color={pct>=100?P.grn:P.orn}>{pct>=100?"完成":Math.round(pct)+"%"}</Tag></div><div style={{height:8,borderRadius:4,background:P.bdr,overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,width:pct+"%",background:P.pri,transition:"width 0.3s ease"}}/></div>{pct<100&&<Btn sm onClick={()=>{setRepairs(repairs.map(x=>x.id===r.id?{...x,currentStage:Math.min((x.currentStage||0)+1,x.stages)}:x));flash("進度已更新")}} style={{marginTop:12,background:P.priL,color:P.priD}}>推進進度 →</Btn>}</Card>})}</>}{tab==="p"&&<><Btn full onClick={()=>setModal(<PdForm onSave={p=>{setPendRep([...pendRep,{...p,id:uid(),createdAt:td()}]);setModal(null);flash("已新增")}} onClose={()=>setModal(null)}/>)} style={{marginBottom:16,background:P.acc}}>📷 提報修繕</Btn>{pendRep.map(p=><Card key={p.id}>{p.photo&&<img src={p.photo} style={{width:"100%",borderRadius:12,marginBottom:12}}/>}<div style={{fontWeight:700,fontSize:16}}>{p.title}</div>{p.note&&<div style={{fontSize:14,color:P.txt2,marginTop:6}}>{p.note}</div>}</Card>)}</>}</>}
function RpForm({onSave,onClose}){const[f,sf]=useState({title:"",stages:3,stageNames:["規劃","施工","驗收"],stageAmounts:[0,0,0]});return<><CT>新增修繕專案</CT><Lb>專案名稱</Lb><Inp value={f.title} onChange={e=>sf({...f,title:e.target.value})}/><Lb>階段數(3~5)</Lb><Inp type="number" min={3} max={5} value={f.stages} onChange={e=>{const n=Math.max(3,Math.min(5,+e.target.value));sf({...f,stages:n,stageNames:Array.from({length:n},(_,i)=>f.stageNames[i]||"階段"+(i+1)),stageAmounts:Array.from({length:n},(_,i)=>f.stageAmounts[i]||0)})}}/>{Array.from({length:f.stages}).map((_,i)=><div key={i} style={{background:P.bg,padding:16,borderRadius:12,marginBottom:10}}><div style={{fontSize:13,fontWeight:700,color:P.pri,marginBottom:8}}>第 {i+1} 階段</div><div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10}}><Inp placeholder="名稱" value={f.stageNames[i]} onChange={e=>{const n=[...f.stageNames];n[i]=e.target.value;sf({...f,stageNames:n})}} style={{marginBottom:0}}/><Inp type="number" placeholder="金額" value={f.stageAmounts[i]||""} onChange={e=>{const a=[...f.stageAmounts];a[i]=+e.target.value||0;sf({...f,stageAmounts:a})}} style={{marginBottom:0}}/></div></div>)}<div style={{display:"flex",gap:10,marginTop:16}}><Btn full onClick={()=>{if(!f.title)return;onSave(f)}}>儲存</Btn><Btn full v="out" onClick={onClose}>取消</Btn></div></>}
function PdForm({onSave,onClose}){const[f,sf]=useState({title:"",note:"",photo:""});return<><CT>新增待修繕</CT><label style={{display:"block",border:"2px dashed "+P.bdr,borderRadius:16,padding:32,textAlign:"center",cursor:"pointer",marginBottom:16,background:P.bgW}}>{f.photo?<img src={f.photo} style={{width:"100%",borderRadius:12}}/>:<><div style={{fontSize:40,marginBottom:8}}>📷</div><div style={{fontSize:14,color:P.txt2}}>點擊上傳照片</div></>}<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>sf({...f,photo:ev.target.result});r.readAsDataURL(file)}}/></label><Lb>標題</Lb><Inp value={f.title} onChange={e=>sf({...f,title:e.target.value})}/><Lb>備註</Lb><Txa value={f.note} onChange={e=>sf({...f,note:e.target.value})}/><div style={{display:"flex",gap:10,marginTop:16}}><Btn full onClick={()=>{if(!f.photo||!f.title){alert("請上傳照片與標題");return;}onSave(f)}}>送出</Btn><Btn full v="out" onClick={onClose}>取消</Btn></div></>}
function WorkPg({workLog,setWorkLog,flash}){const[f,sf]=useState({title:"",time:"",note:""});const items=workLog.filter(w=>w.date===td());return<><Card><CT sub="今日工作日誌">新增項目</CT><Inp placeholder="工作內容" value={f.title} onChange={e=>sf({...f,title:e.target.value})}/><div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}><Inp type="time" value={f.time} onChange={e=>sf({...f,time:e.target.value})}/><Inp placeholder="備註說明" value={f.note} onChange={e=>sf({...f,note:e.target.value})}/></div><Btn full onClick={()=>{if(!f.title){flash("請填寫內容","err");return}setWorkLog([...workLog,{...f,id:uid(),date:td()}]);sf({title:"",time:"",note:""});flash("已記錄")}}>記錄</Btn></Card>{items.map(r=><Card key={r.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><b style={{color:P.priD}}>{r.title}</b>{r.note&&<div style={{fontSize:13,color:P.txt2,marginTop:4}}>{r.note}</div>}</div>{r.time&&<span style={{fontSize:13,color:P.txt3,fontWeight:700}}>{r.time}</span></div></Card>)}</>}

function LP({items,setItems,flash,setModal,type}){const iM=type==="mtg";const Form=({item,onClose})=>{const[f,sf]=useState(item||{title:"",entries:[{title:"",desc:""}]});return<><CT>{item?"編輯":"新增"}{iM?"會議":"活動"}</CT><Lb>標題</Lb><Inp value={f.title} onChange={e=>sf({...f,title:e.target.value})}/>{f.entries.map((t,i)=><div key={i} style={{background:P.bgW,padding:16,borderRadius:12,marginBottom:10}}><Inp placeholder={(iM?"議題":"項目")+(i+1)} value={t.title} onChange={e=>{const a=[...f.entries];a[i]={...a[i],title:e.target.value};sf({...f,entries:a})}}/><Txa placeholder="說明" value={t.desc} onChange={e=>{const a=[...f.entries];a[i]={...a[i],desc:e.target.value};sf({...f,entries:a})}} style={{marginBottom:0}}/></div>)}<Btn full v="ghost" onClick={()=>sf({...f,entries:[...f.entries,{title:"",desc:""}]})} style={{marginBottom:16}}>＋ 新增{iM?"議題":"項目"}</Btn><div style={{display:"flex",gap:10}}><Btn full onClick={()=>{if(!f.title){flash("請填寫標題","err");return}if(f.id)setItems(items.map(x=>x.id===f.id?f:x));else setItems([...items,{...f,id:uid(),createdAt:td()}]);onClose();flash("已儲存")}}>儲存</Btn><Btn full v="out" onClick={onClose}>取消</Btn></div></>};return<><Btn full v={iM?"pri":"acc"} onClick={()=>setModal(<Form onClose={()=>setModal(null)}/>)} style={{marginBottom:16}}>＋ 新增{iM?"會議":"活動"}</Btn>{items.map(m=><Card key={m.id} onClick={()=>setModal(<Form item={m} onClose={()=>setModal(null)}/>)}><div style={{fontWeight:700,fontSize:16,color:P.priD}}>{m.title}</div><div style={{fontSize:13,color:P.txt3,marginTop:6}}>{fmt(m.createdAt)} · {(m.entries&&m.entries.length)||0} 個{iM?"議題":"項目"}</div></Card>)}{!items.length&&<Empty icon={iM?"📋":"🎪"} text={"尚無"+(iM?"會議":"活動")}/>}</>}

// Assembly Setup (區權大會)
function AsmSetup(c){const{asm,setAsm,asmHistory,setAsmHistory,go,flash,residents,asmAtt,setAsmAtt,asmDel,setAsmDel,asmVotes,setAsmVotes,voting,setVoting,vtimer,setVtimer,community,tAtt}=c;
const[f,sf]=useState(asm||{date:"",checkInTime:"",startTime:"",endTime:"",finStart:"",finEnd:"",session:1,proposals:[{title:"",desc:"",id:uid(),type:"general",ratio:"1/2"}]});
const[ci,sCi]=useState("");const[sec,setSec]=useState("main");const[dF,sDF]=useState("");const[dT,sDT]=useState("");const maxD=Math.ceil(((community&&community.totalUnits)||0)/5);

const save=()=>{if(f.finStart&&f.finEnd){if((new Date(f.finEnd)-new Date(f.finStart))/864e5>365){flash("財報區間不得超過一年","err");return}}setAsm(f);setSec("main");flash("設定已靜默儲存")};
const chk=u=>{if(!residents.find(r=>r.unit===u)){flash("查無戶別","err");return}if(asmAtt.includes(u)){flash("已報到","err");return}if(asmDel.find(d=>d.from===u)){flash("此戶已被委託","err");return}setAsmAtt([...asmAtt,u]);flash(u+" 報到成功")};
const regDel=()=>{if(!dF||!dT){flash("請填寫完整","err");return}if(!asmAtt.includes(dT)){flash("受託人未報到","err");return}if(asmAtt.includes(dF)){flash("委託人已報到","err");return}if(asmDel.find(d=>d.from===dF)){flash("已被委託過","err");return}if(asmDel.filter(d=>d.to===dT).length>=maxD){flash("已達上限"+maxD+"張","err");return}if(!residents.find(r=>r.unit===dF)){flash("查無委託人","err");return}setAsmDel([...asmDel,{from:dF,to:dT,id:uid()}]);sDF("");sDT("");flash(dF+"→"+dT+" 委託成功")};
const startV=p=>{const pid=p.id||p.title;setVoting({id:pid,title:p.title,pType:p.type,ratio:p.ratio});setVtimer(120);setAsmVotes({...asmVotes,[pid]:{yes:0,no:0,abstain:0,voted:[]}});flash("投票開始，倒數2分鐘")};
const endAssembly=()=>{if(!asm)return;if(window.confirm("確定要結束並歸檔本次區權大會嗎？")){setAsmHistory([{...asm,id:uid(),votes:asmVotes,att:tAtt},...(asmHistory||[])]);setAsm(null);setAsmAtt([]);setAsmDel([]);setAsmVotes({});setVoting(null);setSec("main");flash("大會已歸檔");}};
const deleteHistory=(hid)=>{if(window.confirm("確定要刪除這筆歷史紀錄？")&&window.confirm("警告：刪除後將無法恢復，請再次確認！")){setAsmHistory((asmHistory||[]).filter(h=>h.id!==hid));flash("歷史紀錄已刪除");}};

return<>
{sec==="main"&&<><div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:18,fontWeight:700}}>區權大會管理</div>{!asm&&<Btn sm onClick={()=>{sf({date:"",checkInTime:"",startTime:"",endTime:"",finStart:"",finEnd:"",session:1,proposals:[{title:"",desc:"",id:uid(),type:"general",ratio:"1/2"}]});setSec("setup")}}>＋ 新建大會</Btn>}</div>
{asm&&<Card onClick={()=>setSec("setup")} style={{background:"linear-gradient(135deg,"+P.pri+","+P.priD+")",color:"#fff",border:"none",padding:24,position:"relative",overflow:"hidden"}}><div style={{position:"absolute",right:-20,bottom:-20,fontSize:100,opacity:0.1}}>🏛</div><div style={{fontSize:13,opacity:.8,marginBottom:4}}>執行中的大會</div><div style={{fontSize:24,fontWeight:900,letterSpacing:1}}>第 {asm.session} 屆</div><div style={{fontSize:16,marginTop:4}}>{(community&&community.name)||auth.communityName} 區分所有權人會議</div><div style={{marginTop:16,display:"inline-block",background:"rgba(255,255,255,0.2)",padding:"6px 16px",borderRadius:20,fontSize:13,fontWeight:700}}>點擊進入管理面板 →</div></Card>}

{active&&!voted&&isA&&<div style={{marginTop:20}}><div style={{fontSize:14,color:P.txt2,textAlign:"center",marginBottom:10,fontWeight:700}}>請投下您手中的 {myV} 票</div><div style={{display:"flex",gap:10}}><button onClick={()=>vote(pid,"yes")} style={{...Z.vBtn,background:P.grn}}>👍 贊成</button><button onClick={()=>vote(pid,"no")} style={{...Z.vBtn,background:P.red}}>👎 不贊成</button><button onClick={()=>vote(pid,"abstain")} style={{...Z.vBtn,background:P.txt3}}>— 廢票</button></div></div>}
{voted&&<div style={{marginTop:16,textAlign:"center",padding:12,background:P.grnL,borderRadius:12,color:P.grn,fontWeight:700,fontSize:16}}>✅ 已投出 {myV} 票</div>}
{v&&<div style={{display:"flex",gap:10,marginTop:16}}>{[["贊成",v.yes,P.grn],["不贊成",v.no,P.red],["廢票",v.abstain,P.txt3]].map(([l,n,c])=><div key={l} style={{flex:1,textAlign:"center",background:P.bgW,borderRadius:12,padding:"10px 4px"}}><div style={{fontSize:24,fontWeight:900,color:c}}>{n}</div><div style={{fontSize:13,color:P.txt2,marginTop:2}}>{l}</div></div>)}</div>}
{ended&&v&&<div style={{textAlign:"center",marginTop:16}}><Tag bg={passed?P.grnL:P.redL} color={passed?P.grn:P.red}>{passed?"✓ 提案通過":"✕ 提案未通過"}（贊成 {v.yes} / 需 {needed}）</Tag></div>}
{!active&&!ended&&!v&&<div style={{marginTop:16,fontSize:13,color:P.txt3,textAlign:"center"}}>尚未開放投票</div>}
</Card>})}</>}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script></body></html>
