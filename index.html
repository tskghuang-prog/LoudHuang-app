  const[auth,setAuth]=useState(null),[ready,setReady]=useState(false),[pg,setPg]=useState("home");

  // 靜默提示（不跳頁）

  useEffect(()=>{const aid=auth&&auth.adminId;if(!aid)return;(async()=>{
    const ks=["res","com","bnk","inc","exc","txn","rep","prp","wkl","mtg","act","asm","asv","asa","asd","ash","bgt"];
    const v=await Promise.all(ks.map(k=>db.g(k+"-"+aid)));
    setResidents(v[0]||[]);setCommunity(v[1]||{name:(auth.communityName||""),totalUnits:0,shops:0,units:0,totalPing:0,renters:0,note:""});
    setBanks(v[2]||[]);setInCats(v[3]||[]);setExCats(v[4]||[]);setTxns(v[5]||[]);
    setRepairs(v[6]||[]);setPendRep(v[7]||[]);setWorkLog(v[8]||[]);
    setMeetings(v[9]||[]);setActs(v[10]||[]);setAsm(v[11]||null);setAsmVotes(v[12]||{});
    setAsmAtt(v[13]||[]);setAsmDel(v[14]||[]);setAsmHist(v[15]||[]);setBudget(v[16]||[])

  const asmEnded=asm&&asm.date&&asm.endTime?new Date(asm.date+"T"+asm.endTime)<=new Date():false;

    else{const all=await db.g("admins")||[];for(const adm of all){const rs=await db.g("res-"+adm.id)||[];const f=rs.find(r=>r.username===u&&r.password===p);if(f){const a={role:"resident",username:u,adminId:adm.id,communityName:adm.communityName,residentName:f.name,unit:f.unit};setAuth(a);await db.s("auth",a);setPg("home");flash("歡迎，"+f.name);return}}showErr("帳號或密碼錯誤")}};
  const logout=async()=>{setAuth(null);await db.d("auth");setPg("home");setHist([]);setDrawer(false)};

  const titles={home:"首頁",accounts:"帳號管理",comInfo:"社區資訊",finance:"財務概況",finSet:"優先設定",incRec:"收入記錄",expRec:"支出記錄",report:"月財報表",finReport:"財報相關",budgetPg:"預算管理",repair:"修繕概況",work:"工作報告",mtgList:"會議管理",actList:"活動管理",asmSet:"區權人大會",asmView:"大會總覽",asmHistory:"歷史紀錄",rFin:"財務概況",rRep:"修繕概況",rMtg:"會議紀錄",rAct:"社區活動",rAsm:"區權人大會",rCom:"社區資訊",admDet:"管理者資訊"};
  const dL=asm&&asm.date?Math.ceil((new Date(asm.date)-new Date())/864e5):null;
  const showBnr=asm&&dL!==null&&dL>=0&&dL<=30&&!asmEnded;
  const dAtt=asmAtt.length,delAtt=asmDel.length,tAtt=dAtt+delAtt;

  const ctx={pg,go,back,goH,auth,flash,showErr,setModal,admins,setAdmins:v=>{setAdmins(v);db.s("admins",v)},
    residents,setResidents:v=>sv("res",v,setResidents),community,setCommunity:v=>sv("com",v,setCommunity),

    asm,setAsm:v=>sv("asm",v,setAsm),asmVotes,setAsmVotes:v=>sv("asv",v,setAsmVotes),asmAtt,setAsmAtt:v=>sv("asa",v,setAsmAtt),
    asmDel,setAsmDel:v=>sv("asd",v,setAsmDel),asmHist,setAsmHist:v=>sv("ash",v,setAsmHist),
    budget,setBudget:v=>sv("bgt",v,setBudget),
    voting,setVoting,vtimer,setVtimer,vEnd,dAtt,delAtt,tAtt,asmEnded};

function SuperDet({admin}){const[ci,sCi]=useState(null),[rs,sRs]=useState([]);useEffect(()=>{(async()=>{sCi(await db.g("com-"+admin.id));sRs(await db.g("res-"+admin.id)||[])})()},[admin.id]);return<><Card style={{background:"linear-gradient(135deg,"+P.priL+","+P.priXL+")",border:"2px solid "+P.pri}}><div style={{fontSize:22,fontWeight:900,color:P.pri}}>{admin.communityName}</div><div style={{fontSize:14,color:P.txt2,marginTop:4}}>管理者：{admin.title}</div></Card>{ci&&<Card><CT>社區概況</CT><TRow label="總戶數" value={ci.totalUnits}/><TRow label="店面" value={ci.shops}/><TRow label="戶數" value={ci.units}/><TRow label="承租" value={ci.renters}/><TRow label="總坪" value={ci.totalPing} last/></Card>}<Card><CT sub={"共"+rs.length+"戶"}>住戶名冊</CT>{rs.map((r,i)=><div key={r.id} style={{padding:"10px 0",...(i<rs.length-1?{borderBottom:"1px solid "+P.bdr}:{})}}><b>{r.unit}</b> — {r.name} {r.role&&<Tag bg={P.accL} color={P.acc}>{r.role}</Tag>}</div>)}{!rs.length&&<div style={{color:P.txt3}}>尚無資料</div>}</Card></>}

function TxRec({type,banks,inCats,exCats,txns,setTxns,flash,showErr}){const isI=type==="income",cats=isI?inCats:exCats,clr=isI?P.grn:P.red;const[f,sf]=useState({acctId:"",cat:"",date:td(),amount:"",note:""});const save=()=>{if(!f.acctId||!f.cat||!f.amount){showErr("請填寫帳戶、類別與金額");return}setTxns([{...f,id:uid(),type,amount:parseFloat(f.amount),ts:Date.now()},...txns]);sf({acctId:"",cat:"",date:td(),amount:"",note:""});flash("已記錄")};const list=txns.filter(t=>t.type===type);return<><Card style={{borderTop:"4px solid "+clr}}><CT color={clr}>{isI?"👛📥 記錄收入":"👛📤 記錄支出"}</CT><Lb>帳戶</Lb><Sel value={f.acctId} onChange={e=>sf({...f,acctId:e.target.value})}><option value="">選擇</option>{banks.map(b=><option key={b.id} value={b.id}>...{b.account.slice(-5)}({b.purpose})</option>)}</Sel><Lb>類別</Lb><Sel value={f.cat} onChange={e=>sf({...f,cat:e.target.value})}><option value="">選擇</option>{cats.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</Sel><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><Lb>日期</Lb><Inp type="date" value={f.date} onChange={e=>sf({...f,date:e.target.value})}/></div><div><Lb>金額</Lb><Inp type="number" value={f.amount} onChange={e=>sf({...f,amount:e.target.value})}/></div></div><Lb>備註</Lb><Txa value={f.note} onChange={e=>sf({...f,note:e.target.value})}/><Btn full v={isI?"grn":"red"} onClick={save} style={{marginTop:6}}>儲存</Btn></Card>{list.map(t=><Card key={t.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:600}}>{t.cat}</div><div style={{fontSize:12,color:P.txt3}}>{fmt(t.date)}{t.note&&" · "+t.note}</div></div><div style={{fontSize:18,fontWeight:800,color:clr}}>{isI?"+":"-"}${t.amount&&t.amount.toLocaleString()}</div></div></Card>)}{!list.length&&<Empty icon={isI?"📈":"📉"} text="尚無記錄"/>}</>}

// ═══ Assembly Setup — 收合式卡片 + 結束大會 + 歷史紀錄 ═══
function AsmSetup(c){const{asm,setAsm,go,flash,showErr,residents,asmAtt,setAsmAtt,asmDel,setAsmDel,asmVotes,setAsmVotes,voting,setVoting,vtimer,setVtimer,community,tAtt,asmHist,setAsmHist}=c;
  const[f,sf]=useState(asm||{date:"",checkInTime:"",startTime:"",endTime:"",finStart:"",finEnd:"",session:1,proposals:[{title:"",desc:"",id:uid(),type:"general",ratio:"1/2"}]});
  const[ci,sCi]=useState("");const[sec,setSec]=useState(null);// null=收合, "setup"/"checkin"/"delegate"/"vote"
  const[dF,sDF]=useState("");const[dT,sDT]=useState("");
  const maxD=Math.ceil(((community&&community.totalUnits)||0)/5);

  // 靜默儲存（不跳頁）
  const save=()=>{if(f.finStart&&f.finEnd){if((new Date(f.finEnd)-new Date(f.finStart))/864e5>365){showErr("財報期間不得超過一年");return}}setAsm(f);flash("設定已儲存")};
  const chk=u=>{if(!residents.find(r=>r.unit===u)){showErr("查無此戶別");return}if(asmAtt.includes(u)){showErr("此戶已報到");return}if(asmDel.find(d=>d.from===u)){showErr("此戶已被委託");return}setAsmAtt([...asmAtt,u]);flash(u+" 報到成功")};
  const regDel=()=>{if(!dF||!dT){showErr("請填寫委託人與受託人");return}if(!asmAtt.includes(dT)){showErr("受託人尚未報到");return}if(asmAtt.includes(dF)){showErr("委託人已親自報到");return}if(asmDel.find(d=>d.from===dF)){showErr("此戶已被委託過");return}if(asmDel.filter(d=>d.to===dT).length>=maxD){showErr("受託人已達委託上限 "+maxD+" 張");return}if(!residents.find(r=>r.unit===dF)){showErr("查無委託人戶別");return}setAsmDel([...asmDel,{from:dF,to:dT,id:uid()}]);sDF("");sDT("");flash("委託登記成功")};
  // 投票 120秒
  const startV=p=>{const pid=p.id||p.title;setVoting({id:pid,title:p.title});setVtimer(120);setAsmVotes({...asmVotes,[pid]:{yes:0,no:0,abstain:0,voted:[]}});flash("投票開始（2分鐘）")};
  // 結束大會 → 歸檔歷史
  const endAsm=()=>{if(!window.confirm("確定要結束本屆區權人大會？"))return;if(!window.confirm("結束後資料將歸檔至歷史紀錄，此操作無法復原，確定繼續？"))return;
    const record={id:uid(),session:asm.session,date:asm.date,endedAt:new Date().toISOString(),asm:{...asm},votes:{...asmVotes},attendees:[...asmAtt],delegates:[...asmDel],totalAtt:tAtt};
    setAsmHist([record,...asmHist]);setAsm(null);setAsmVotes({});setAsmAtt([]);setAsmDel([]);setSec(null);flash("大會已結束，資料已歸檔")};

  return<>
    {/* 收合式資訊卡 */}
    {asm&&!sec&&<Card onClick={()=>setSec("setup")} style={{cursor:"pointer",background:"linear-gradient(135deg,"+P.priL+","+P.priXL+")",border:"2px solid "+P.pri,textAlign:"center",padding:24}}>
      <div style={{fontSize:20,fontWeight:900,color:P.pri}}>第 {asm.session} 屆 區權人大會</div>
      <div style={{fontSize:14,color:P.txt2,marginTop:6}}>{fmt(asm.date)} {asm.startTime}～{asm.endTime||"—"}</div>
      <div style={{fontSize:13,color:P.acc,marginTop:10,fontWeight:600}}>點擊展開設定 ▼</div>
    </Card>}

    {/* 歷史紀錄按鈕 */}
    <Btn full v="ghost" onClick={()=>go("asmHistory")} style={{marginBottom:14}}>📜 歷史紀錄（{asmHist.length}屆）</Btn>

    {/* 展開後的 Tab */}
    {(sec||!asm)&&<>
      {asm&&<div style={{display:"flex",gap:6,marginBottom:14,background:P.bgW,borderRadius:12,padding:4}}>
        {[["setup","設定"],["checkin","報到"],["delegate","委託"],["vote","投票"],["view","總覽"]].map(([k,l])=><button key={k} onClick={()=>k==="view"?go("asmView"):setSec(k)} style={{...Z.tabBtn,...(sec===k?Z.tabAct:{})}}>{l}</button>)}
        <button onClick={()=>setSec(null)} style={{...Z.tabBtn,maxWidth:40,color:P.txt3}}>▲</button>
      </div>}

      {/* Setup */}
      {(sec==="setup"||!asm)&&<><Card style={{padding:22}}><CT sub="設定大會資訊">區權人大會</CT>
        <Lb>大會日期</Lb><Inp type="date" value={f.date||""} onChange={e=>sf({...f,date:e.target.value})}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}><div><Lb>報到</Lb><Inp type="time" value={f.checkInTime||""} onChange={e=>sf({...f,checkInTime:e.target.value})}/></div><div><Lb>開始</Lb><Inp type="time" value={f.startTime||""} onChange={e=>sf({...f,startTime:e.target.value})}/></div><div><Lb>結束</Lb><Inp type="time" value={f.endTime||""} onChange={e=>sf({...f,endTime:e.target.value})}/></div></div>
        <Lb>第幾屆</Lb><Inp type="number" min={1} max={60} value={f.session||""} onChange={e=>sf({...f,session:Math.min(60,+e.target.value||1)})}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><Lb>財報起始</Lb><Inp type="date" value={f.finStart||""} onChange={e=>sf({...f,finStart:e.target.value})}/></div><div><Lb>財報結束</Lb><Inp type="date" value={f.finEnd||""} onChange={e=>sf({...f,finEnd:e.target.value})}/></div></div></Card>
        <Card><CT sub={(f.proposals&&f.proposals.length||0)+"/10案"}>提案管理</CT>{(f.proposals||[]).map((p,i)=><div key={i} style={{background:P.bg,padding:14,borderRadius:14,marginBottom:10,position:"relative"}}>
          <div style={{display:"flex",gap:6,marginBottom:8}}><Tag bg={p.type==="major"?P.redL:P.bluL} color={p.type==="major"?P.red:P.blu}>{p.type==="major"?"重大":"一般"}</Tag><Tag bg={P.ornL} color={P.orn}>{p.ratio||"1/2"}</Tag></div>
          <Inp placeholder="標題" value={p.title} onChange={e=>{const a=[...f.proposals];a[i]={...a[i],title:e.target.value};sf({...f,proposals:a})}}/><Txa placeholder="說明" value={p.desc} onChange={e=>{const a=[...f.proposals];a[i]={...a[i],desc:e.target.value};sf({...f,proposals:a})}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><Lb>類型</Lb><Sel value={p.type||"general"} onChange={e=>{const a=[...f.proposals];a[i]={...a[i],type:e.target.value};sf({...f,proposals:a})}}><option value="general">一般</option><option value="major">重大</option></Sel></div><div><Lb>門檻</Lb><Sel value={p.ratio||"1/2"} onChange={e=>{const a=[...f.proposals];a[i]={...a[i],ratio:e.target.value};sf({...f,proposals:a})}}><option value="1/2">1/2</option><option value="2/3">2/3</option></Sel></div></div>
          {f.proposals.length>1&&<button onClick={()=>sf({...f,proposals:f.proposals.filter((_,j)=>j!==i)})} style={{...Z.iBtn,position:"absolute",top:8,right:8}}>✕</button>}
        </div>)}{(f.proposals&&f.proposals.length||0)<10&&<Btn full v="ghost" onClick={()=>sf({...f,proposals:[...(f.proposals||[]),{title:"",desc:"",id:uid(),type:"general",ratio:"1/2"}]})}>＋新增提案</Btn>}</Card>
        <Btn full onClick={save} style={{marginBottom:10,padding:16,fontSize:17}}>儲存設定</Btn>
        {asm&&<Btn full v="red" onClick={endAsm} style={{marginBottom:14}}>🔴 結束大會（歸檔歷史）</Btn>}
      </>}

      {/* Check-in */}
      {sec==="checkin"&&asm&&<><Card style={{textAlign:"center",padding:24}}><div style={{fontSize:48,fontWeight:900,color:P.pri}}>{asmAtt.length}</div><div style={{color:P.txt2}}>親自出席</div><div style={{marginTop:10,display:"flex",gap:8,justifyContent:"center"}}><Inp placeholder="戶別" value={ci} onChange={e=>sCi(e.target.value)} style={{maxWidth:200,textAlign:"center",marginBottom:0}}/><Btn onClick={()=>{chk(ci);sCi("")}}>報到</Btn></div></Card>{asmAtt.length>0&&<Card><CT>已報到</CT><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{asmAtt.map(u=><Tag key={u} bg={P.grnL} color={P.grn}>{u}</Tag>)}</div></Card>}</>}

      {/* Delegate */}
      {sec==="delegate"&&asm&&<><Card style={{padding:22}}><CT sub={"每人上限"+maxD+"張"}>委託登記</CT><div style={{background:P.bluL,padding:12,borderRadius:10,marginBottom:14,fontSize:13,color:P.blu}}>受託人須已報到、委託人不可已報到、不可重複、上限{maxD}張</div><Lb>委託人</Lb><Inp value={dF} onChange={e=>sDF(e.target.value)}/><Lb>受託人</Lb><Inp value={dT} onChange={e=>sDT(e.target.value)}/><Btn full onClick={regDel}>登記</Btn></Card>{asmDel.length>0&&<Card><CT sub={"共"+asmDel.length+"筆"}>委託名單</CT>{asmDel.map(d=><div key={d.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+P.bdr}}><div><Tag bg={P.ornL} color={P.orn}>{d.from}</Tag>→<Tag bg={P.grnL} color={P.grn}>{d.to}</Tag></div><Btn sm v="out" onClick={()=>{setAsmDel(asmDel.filter(x=>x.id!==d.id));flash("已撤銷")}} style={{color:P.red,padding:"4px 10px"}}>撤銷</Btn></div>)}</Card>}</>}

      {/* Vote */}
      {sec==="vote"&&asm&&<>{(asm.proposals||[]).map((p,i)=>{const pid=p.id||p.title,v=asmVotes[pid],active=voting&&voting.id===pid&&!voting.ended,ended=voting&&voting.id===pid&&voting.ended;const ratio=p.ratio==="2/3"?2/3:.5;const needed=Math.ceil(tAtt*ratio);const passed=v&&v.yes>=needed;return<Card key={i} style={{borderLeft:active?"4px solid "+P.acc:ended?"4px solid "+(passed?P.grn:P.red):"none"}}><div style={{display:"flex",gap:6,marginBottom:6}}><Tag bg={p.type==="major"?P.redL:P.bluL} color={p.type==="major"?P.red:P.blu}>{p.type==="major"?"重大":"一般"}</Tag><Tag bg={P.ornL} color={P.orn}>門檻{p.ratio}（需{needed}票）</Tag></div><div style={{fontWeight:700,fontSize:16}}>{p.title}</div>{v&&<div style={{display:"flex",gap:10,marginTop:12,padding:10,background:P.bg,borderRadius:10}}>{[["贊成",v.yes,P.grn],["不贊成",v.no,P.red],["廢票",v.abstain,P.txt3]].map(([l,n,co])=><div key={l} style={{flex:1,textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:co}}>{n}</div><div style={{fontSize:12,color:P.txt3}}>{l}</div></div>)}</div>}{active&&<div style={{marginTop:10,textAlign:"center",fontSize:18,fontWeight:800,color:P.acc}}>投票中 {Math.floor(vtimer/60)+":"+(vtimer%60<10?"0":"")+(vtimer%60)}</div>}{ended&&v&&<div style={{marginTop:10,textAlign:"center"}}><Tag bg={passed?P.grnL:P.redL} color={passed?P.grn:P.red}>{passed?"✓通過":"✕未通過"}（{v.yes}/{needed}）</Tag></div>}{!active&&!ended&&<Btn full onClick={()=>startV(p)} style={{marginTop:12}}>🗳 開始投票（2分鐘）</Btn>}</Card>})}</>}
    </>}
  </>
}

// ═══ Assembly History ═══
function AsmHistPg({asmHist,setAsmHist,flash,setModal}){
  const delHist=(id)=>{if(!window.confirm("確定要刪除此歷史紀錄？"))return;if(!window.confirm("此操作無法復原，再次確認刪除？"))return;setAsmHist(asmHist.filter(h=>h.id!==id));flash("已刪除")};
  const ViewHist=({h})=><><CT>第{h.session}屆 區權人大會</CT><TRow label="日期" value={fmt(h.date)}/><TRow label="結束時間" value={h.endedAt?new Date(h.endedAt).toLocaleString("zh-TW"):""}/><TRow label="親自出席" value={h.attendees&&h.attendees.length}/><TRow label="委託出席" value={h.delegates&&h.delegates.length}/><TRow label="總出席" value={h.totalAtt} last/><Div/>{h.asm&&h.asm.proposals&&h.asm.proposals.map((p,i)=>{const v=h.votes&&h.votes[p.id||p.title];return<div key={i} style={{background:P.bg,padding:12,borderRadius:10,marginBottom:8}}><div style={{display:"flex",gap:6,marginBottom:4}}><Tag bg={p.type==="major"?P.redL:P.bluL} color={p.type==="major"?P.red:P.blu}>{p.type==="major"?"重大":"一般"}</Tag></div><b>{p.title}</b>{v&&<div style={{display:"flex",gap:8,marginTop:8}}>{[["贊成",v.yes,P.grn],["不贊成",v.no,P.red],["廢票",v.abstain,P.txt3]].map(([l,n,c])=><div key={l} style={{flex:1,textAlign:"center",background:P.card,borderRadius:8,padding:6}}><div style={{fontWeight:800,color:c}}>{n}</div><div style={{fontSize:11,color:P.txt3}}>{l}</div></div>)}</div>}</div>})}<Btn full v="out" onClick={()=>setModal(null)} style={{marginTop:12}}>關閉</Btn></>;

  return<><div style={{fontSize:19,fontWeight:800,marginBottom:14}}>歷史紀錄（{asmHist.length}屆）</div>
    {asmHist.map(h=><Card key={h.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div onClick={()=>setModal(<ViewHist h={h}/>)} style={{cursor:"pointer",flex:1}}><div style={{fontWeight:700}}>第{h.session}屆</div><div style={{fontSize:13,color:P.txt2}}>{fmt(h.date)} · 出席{h.totalAtt}人</div></div>
      <Btn sm v="out" onClick={()=>delHist(h.id)} style={{color:P.red}}>刪除</Btn>
    </div></Card>)}
    {!asmHist.length&&<Empty icon="📜" text="尚無歷史紀錄"/>}
  </>
}

// ═══ Assembly View ═══
function AsmView({asm,community,auth,txns}){if(!asm)return<Empty icon="🏛" text="尚未設定"/>;const rTx=txns.filter(t=>t.date>=(asm.finStart||"")&&t.date<=(asm.finEnd||""));const months=[];if(asm.finStart&&asm.finEnd){let d=new Date(asm.finStart);const e=new Date(asm.finEnd);while(d<=e){months.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));d.setMonth(d.getMonth()+1)}}const ms=(m,t)=>rTx.filter(x=>x.type===t&&x.date&&x.date.startsWith(m)).reduce((s,x)=>s+(x.amount||0),0);const tI=rTx.filter(t=>t.type==="income").reduce((s,t)=>s+(t.amount||0),0),tE=rTx.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.amount||0),0);return<><Card style={{background:"linear-gradient(135deg,"+P.pri+","+P.priD+")",color:"#FFFEFA",textAlign:"center",border:"none",padding:24}}><div style={{fontSize:14,opacity:.7}}>第{asm.session}屆</div><div style={{fontSize:22,fontWeight:900,marginTop:4}}>{(community&&community.name)||auth.communityName}</div><div style={{fontSize:18,fontWeight:700}}>區權人大會</div><div style={{fontSize:14,opacity:.8,marginTop:6}}>{fmt(asm.date)} {asm.startTime}～{asm.endTime||""}</div></Card>{community&&<Card><CT>社區概況</CT><TRow label="總戶數" value={community.totalUnits}/><TRow label="店面" value={community.shops}/><TRow label="戶數" value={community.units}/><TRow label="承租" value={community.renters}/><TRow label="總坪" value={community.totalPing} last/></Card>}<Card><CT sub={(asm.finStart||"")+"～"+(asm.finEnd||"")}>年度財務</CT><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:P.priXL}}><th style={Z.th}>月份</th><th style={{...Z.th,color:P.grn}}>收入</th><th style={{...Z.th,color:P.red}}>支出</th><th style={Z.th}>結餘</th></tr></thead><tbody>{months.map(m=>{const i=ms(m,"income"),e=ms(m,"expense");return<tr key={m} style={{borderBottom:"1px solid "+P.bdr}}><td style={Z.td}>{m}</td><td style={{...Z.td,color:P.grn}}>{i?"$"+i.toLocaleString():"-"}</td><td style={{...Z.td,color:P.red}}>{e?"$"+e.toLocaleString():"-"}</td><td style={{...Z.td,fontWeight:700}}>${(i-e).toLocaleString()}</td></tr>})}</tbody><tfoot><tr style={{background:P.bgW,fontWeight:800}}><td style={Z.td}>合計</td><td style={{...Z.td,color:P.grn}}>${tI.toLocaleString()}</td><td style={{...Z.td,color:P.red}}>${tE.toLocaleString()}</td><td style={Z.td}>${(tI-tE).toLocaleString()}</td></tr></tfoot></table></div></Card></>}

// ═══ Resident Pages ═══
function ResidentR(c){const m={home:()=><RHome{...c}/>,rFin:()=><RFin{...c}/>,rRep:()=><RRep{...c}/>,rMtg:()=><RMtg{...c}/>,rAct:()=><RAct{...c}/>,rAsm:()=><RAsm{...c}/>,rCom:()=><RCom{...c}/>};const C=m[c.pg]||m.home;return<C/>}
function RHome({go,auth,asm}){const items=[["🏢","社區資訊","rCom"],["💰","財務","rFin"],["🔧","修繕","rRep"],["📋","會議","rMtg"],["🎪","活動","rAct"]];if(asm)items.push(["🏛","區權人大會","rAsm"]);return<><Card style={{background:"linear-gradient(135deg,"+P.pri+","+P.priD+")",color:"#FFFEFA",border:"none"}}><div style={{fontSize:13,opacity:.7}}>住戶專區</div><div style={{fontSize:22,fontWeight:900,marginTop:2}}>{auth.communityName}</div><div style={{fontSize:15,opacity:.85,marginTop:2}}>歡迎，{auth.residentName||auth.username}（{auth.unit}）</div></Card><Grid2>{items.map(([i,l,p])=><Tile key={p} icon={i} label={l} onClick={()=>go(p)} bg={p==="rAsm"?P.accL:undefined}/>)}</Grid2></>}
function RCom({community}){if(!community)return<Empty icon="🏢" text="尚無資訊"/>;return<Card><div style={{fontSize:22,fontWeight:900,color:P.pri,marginBottom:14}}>{community.name}</div><TRow label="總戶數" value={community.totalUnits}/><TRow label="店面" value={community.shops}/><TRow label="戶數" value={community.units}/><TRow label="承租" value={community.renters}/><TRow label="總坪" value={community.totalPing} last/></Card>}
function RFin({txns}){const iT=txns.filter(t=>t.type==="income").reduce((s,t)=>s+(t.amount||0),0),eT=txns.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.amount||0),0);return<><Card style={{textAlign:"center",padding:24}}><div style={{fontSize:12,color:P.txt3}}>總結餘</div><div style={{fontSize:32,fontWeight:900,color:P.pri}}>${(iT-eT).toLocaleString()}</div></Card>{txns.slice(0,20).map(t=><Card key={t.id}><div style={{display:"flex",justifyContent:"space-between"}}><div><b>{t.cat}</b><div style={{fontSize:12,color:P.txt3}}>{fmt(t.date)}</div></div><span style={{fontSize:17,fontWeight:800,color:t.type==="income"?P.grn:P.red}}>{t.type==="income"?"+":"-"}${t.amount&&t.amount.toLocaleString()}</span></div></Card>)}</>}
function RRep({repairs,pendRep}){return<>{repairs.map(r=>{const pct=r.stages>0?((r.currentStage||0)/r.stages)*100:0;return<Card key={r.id}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><b>{r.title}</b><Tag bg={pct>=100?P.grnL:P.ornL} color={pct>=100?P.grn:P.orn}>{Math.round(pct)}%</Tag></div><div style={{height:8,borderRadius:4,background:P.bdr,overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,width:pct+"%",background:"linear-gradient(90deg,"+P.pri+","+P.grn+")"}}/></div></Card>})}{pendRep.map(p=><Card key={p.id}>{p.photo&&<img src={p.photo} style={{width:"100%",borderRadius:14,marginBottom:10}}/>}<b>{p.title}</b></Card>)}{!repairs.length&&!pendRep.length&&<Empty icon="🔧" text="無修繕"/>}</>}
function RMtg({meetings}){return<>{meetings.map(m=><Card key={m.id}><b style={{fontSize:16}}>{m.title}</b>{(m.entries||[]).map((t,i)=><div key={i} style={{background:P.bg,padding:10,borderRadius:10,marginTop:8}}><b>議題{i+1}：{t.title}</b>{t.desc&&<div style={{fontSize:13,color:P.txt2}}>{t.desc}</div>}</div>)}</Card>)}{!meetings.length&&<Empty icon="📋" text="尚無會議"/>}</>}
function RAct({acts}){return<>{acts.map(a=><Card key={a.id}><b style={{fontSize:16}}>{a.title}</b>{(a.entries||[]).map((t,i)=><div key={i} style={{background:P.bg,padding:10,borderRadius:10,marginTop:8}}><b>{t.title}</b>{t.desc&&<div style={{fontSize:13,color:P.txt2}}>{t.desc}</div>}</div>)}</Card>)}{!acts.length&&<Empty icon="🎪" text="尚無活動"/>}</>}

// ═══ Resident Assembly with Delegate Voting ═══
function RAsm({asm,community,auth,asmVotes,setAsmVotes,asmAtt,asmDel,voting,vtimer,flash,showErr,dAtt,delAtt,tAtt}){
  if(!asm)return<Empty icon="🏛" text="尚未設定"/>;
  const isA=asmAtt.includes(auth.unit);const myD=asmDel.filter(d=>d.to===auth.unit).length;const myV=isA?1+myD:0;
  const vote=(pid,v)=>{if(!isA){showErr("您尚未報到，請洽管理者");return}const cur=asmVotes[pid]||{yes:0,no:0,abstain:0,voted:[]};if(cur.voted&&cur.voted.includes(auth.unit)){showErr("您已完成投票");return}setAsmVotes({...asmVotes,[pid]:{...cur,[v]:(cur[v]||0)+myV,voted:[...(cur.voted||[]),auth.unit]}});flash("已投入 "+myV+" 票")};

  return<><Card style={{background:"linear-gradient(135deg,"+P.pri+","+P.priD+")",color:"#FFFEFA",textAlign:"center",border:"none",padding:24}}>
    <div style={{fontSize:14,opacity:.7}}>第{asm.session}屆</div>
    <div style={{fontSize:22,fontWeight:900,marginTop:4}}>{(community&&community.name)||auth.communityName}</div>
    <div style={{fontSize:18,fontWeight:700}}>區權人大會</div>
    <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:14,flexWrap:"wrap"}}>
      <div style={{background:"rgba(255,254,250,.15)",borderRadius:10,padding:"6px 14px"}}><div style={{fontSize:11,opacity:.7}}>親自</div><div style={{fontSize:18,fontWeight:900}}>{dAtt}</div></div>
      <div style={{background:"rgba(255,254,250,.15)",borderRadius:10,padding:"6px 14px"}}><div style={{fontSize:11,opacity:.7}}>委託</div><div style={{fontSize:18,fontWeight:900}}>{delAtt}</div></div>
      <div style={{background:"rgba(255,254,250,.2)",borderRadius:10,padding:"6px 14px"}}><div style={{fontSize:11,opacity:.7}}>總出席</div><div style={{fontSize:20,fontWeight:900}}>{tAtt}</div></div>
    </div>
  </Card>
  {!isA&&<Card style={{background:P.ornL,border:"2px solid "+P.orn}}><div style={{textAlign:"center",fontWeight:700,color:P.orn}}>⏳ 尚未報到，請至管理者處辦理</div></Card>}
  {isA&&myD>0&&<Card style={{background:P.bluL,border:"1.5px solid "+P.blu}}><div style={{textAlign:"center",fontWeight:700,color:P.blu}}>您持有 {myV} 票（含 {myD} 張委託票）</div></Card>}
  {(asm.proposals||[]).map((p,i)=>{const pid=p.id||p.title,v=asmVotes[pid],active=voting&&voting.id===pid&&!voting.ended,ended=voting&&voting.id===pid&&voting.ended,voted=v&&v.voted&&v.voted.includes(auth.unit);const ratio=p.ratio==="2/3"?2/3:.5;const needed=Math.ceil(tAtt*ratio);const passed=v&&v.yes>=needed;
    return<Card key={i} style={{borderLeft:active?"4px solid "+P.acc:ended?"4px solid "+(passed?P.grn:P.red):"none"}}>
      <div style={{display:"flex",gap:6,marginBottom:6}}><Tag bg={p.type==="major"?P.redL:P.bluL} color={p.type==="major"?P.red:P.blu}>{p.type==="major"?"重大":"一般"}</Tag><Tag bg={P.ornL} color={P.orn}>門檻{p.ratio}</Tag></div>
      <div style={{fontWeight:700,fontSize:17}}>{p.title}</div>{p.desc&&<div style={{fontSize:14,color:P.txt2,marginTop:4}}>{p.desc}</div>}
      {active&&!voted&&isA&&<div style={{marginTop:16}}><div style={{fontSize:13,color:P.txt2,textAlign:"center",marginBottom:8}}>投下 {myV} 票</div><div style={{display:"flex",gap:8}}><button onClick={()=>vote(pid,"yes")} style={{...Z.vBtn,background:P.grn}}>👍 贊成</button><button onClick={()=>vote(pid,"no")} style={{...Z.vBtn,background:P.red}}>👎 不贊成</button><button onClick={()=>vote(pid,"abstain")} style={{...Z.vBtn,background:"#8A8480"}}>— 廢票</button></div></div>}
      {voted&&<div style={{marginTop:12,textAlign:"center",padding:10,background:P.grnL,borderRadius:10,color:P.grn,fontWeight:700}}>✅ 已投 {myV} 票</div>}
      {v&&<div style={{display:"flex",gap:8,marginTop:12}}>{[["贊成",v.yes,P.grn],["不贊成",v.no,P.red],["廢票",v.abstain,P.txt3]].map(([l,n,c])=><div key={l} style={{flex:1,textAlign:"center",background:P.bg,borderRadius:10,padding:"8px 4px"}}><div style={{fontSize:22,fontWeight:900,color:c}}>{n}</div><div style={{fontSize:12,color:P.txt3}}>{l}</div></div>)}</div>}
      {ended&&v&&<div style={{textAlign:"center",marginTop:10}}><Tag bg={passed?P.grnL:P.redL} color={passed?P.grn:P.red}>{passed?"✓通過":"✕未通過"}（{v.yes}/{needed}）</Tag></div>}
      {!active&&!ended&&!v&&<div style={{marginTop:10,fontSize:13,color:P.txt3,textAlign:"center"}}>尚未投票</div>}
    </Card>
  })}</>
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
