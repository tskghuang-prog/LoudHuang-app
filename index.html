<html lang="zh-TW">
<head>

</head>
<body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script>
    window.firedb = null;
    window.dbMode = 'local';
    function initFirebase() {
      var s1 = document.createElement('script');
      s1.src = 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js';
      s1.onload = function() {
        var s2 = document.createElement('script');
        s2.src = 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js';
        s2.onload = function() {
          try {
            // 替換為新的 Firebase 後端設定
            firebase.initializeApp({
              apiKey: "AIzaSyDUa5iD33f0Crv4Pq2IbKD2Sadkkdsenp0",
              authDomain: "yinghan-community-db.firebaseapp.com",
              projectId: "yinghan-community-db",
              storageBucket: "yinghan-community-db.firebasestorage.app",
              messagingSenderId: "562651713458",
              appId: "1:562651713458:web:31b7c65b1bda1d394b5eab",
              measurementId: "G-VH5Z7SBH8Z"
            });
            window.firedb = firebase.firestore();
            window.dbMode = 'cloud';
            console.log('Firebase connected!');
            if (window.onFirebaseReady) window.onFirebaseReady();
          } catch(e) { console.error('Firebase init failed:', e); }
        };
        s2.onerror = function() { console.error('Firestore SDK failed to load'); };
        document.head.appendChild(s2);
      };
      s1.onerror = function() { console.error('Firebase SDK failed to load'); };
      document.head.appendChild(s1);

    initFirebase();
  </script>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ═══════════════════════════════════════════════════════════════
   社區管理系統  —  Community Management System
   Design: Wabi-Sabi Refined — Japanese warmth meets clarity
   Philosophy: Respect for residents, clarity for managers,
               dignity for the democratic process
═══════════════════════════════════════════════════════════════ */

const db = {
  async g(k) {
    try {
      if (window.firedb) {
        const doc = await window.firedb.collection('cms').doc(k).get();
        if (doc.exists) { const val = doc.data().v; localStorage.setItem('cms_'+k, JSON.stringify(val)); return val; }
        return null;
      }
      const v = localStorage.getItem('cms_'+k); return v ? JSON.parse(v) : null;
    } catch(e) { try { const v = localStorage.getItem('cms_'+k); return v ? JSON.parse(v) : null; } catch { return null; } }
  },
  async s(k, v) {
    try { localStorage.setItem('cms_'+k, JSON.stringify(v)); } catch {}
    try { if (window.firedb) await window.firedb.collection('cms').doc(k).set({ v: v, t: Date.now() }); } catch(e) { console.error('sync err:', e); }
  },
  async d(k) {
    try { localStorage.removeItem('cms_'+k); } catch {}
    try { if (window.firedb) await window.firedb.collection('cms').doc(k).delete(); } catch(e) { console.error('sync err:', e); }
  },
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const td = () => new Date().toISOString().slice(0, 10);
const fmt = d => d ? `${d.slice(0,4)}/${d.slice(5,7)}/${d.slice(8,10)}` : "";

const P = {
  bg:"#F5F1EB",bgW:"#EDE8E0",card:"#FFFFFF",
  pri:"#3D6B4F",priD:"#2A4D38",priL:"#E4EDE7",priXL:"#F0F5F1",
  acc:"#C2703A",accD:"#A35A2B",accL:"#FEF0E5",
  grn:"#3A8F5C",grnL:"#E8F5ED",red:"#C94444",redL:"#FDE9E9",
  orn:"#D4882E",ornL:"#FFF4E4",blu:"#4A7FB5",bluL:"#E8F0F8",
  ink:"#1C1C1C",txt:"#3A3A3A",txt2:"#7A7571",txt3:"#B5AFA8",
  bdr:"#E4DFD7",shd:"0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04)",
};

function App() {
  const [auth,setAuth]=useState(null),[ready,setReady]=useState(false),[pg,setPg]=useState("home");
  const [hist,setHist]=useState([]),[drawer,setDrawer]=useState(false),[modal,setModal]=useState(null),[toast,setToast]=useState(null);
  const [admins,setAdmins]=useState([]),[residents,setResidents]=useState([]),[community,setCommunity]=useState(null);
  const [banks,setBanks]=useState([]),[inCats,setInCats]=useState([]),[exCats,setExCats]=useState([]);
  const [txns,setTxns]=useState([]),[repairs,setRepairs]=useState([]),[pendRep,setPendRep]=useState([]);
  const [workLog,setWorkLog]=useState([]),[meetings,setMeetings]=useState([]),[acts,setActs]=useState([]);
  const [asm,setAsm]=useState(null),[asmVotes,setAsmVotes]=useState({}),[asmAtt,setAsmAtt]=useState([]);
  const [voting,setVoting]=useState(null),[vtimer,setVtimer]=useState(0);

  const flash=useCallback((m,t="ok")=>{setToast({m,t});setTimeout(()=>setToast(null),2400)},[]);
  const go=useCallback(p=>{setHist(h=>[...h,pg]);setPg(p);setDrawer(false)},[pg]);
  const back=useCallback(()=>{if(hist.length){setPg(hist[hist.length-1]);setHist(h=>h.slice(0,-1))}},[hist]);
  const goHome=useCallback(p=>{setHist([]);setPg(p)},[]);

  useEffect(()=>{(async()=>{const a=await db.g("auth");if(a)setAuth(a);const ad=await db.g("admins");if(ad)setAdmins(ad);setReady(true)})()},[]);
  useEffect(()=>{const aid=auth?.adminId;if(!aid)return;(async()=>{
    const keys=["res","com","bnk","inc","exc","txn","rep","prp","wkl","mtg","act","asm","asv","asa"];
    const v=await Promise.all(keys.map(k=>db.g(`${k}-${aid}`)));
    const [r,c,b,ic,ec,tx,rp,pr,wl,mt,ac,as,av,aa]=v;
    setResidents(r||[]);setCommunity(c||{name:auth.communityName||"",totalUnits:0,shops:0,units:0,totalPing:0,renters:0,note:""});
    setBanks(b||[]);setInCats(ic||[]);setExCats(ec||[]);setTxns(tx||[]);
    setRepairs(rp||[]);setPendRep(pr||[]);setWorkLog(wl||[]);
    setMeetings(mt||[]);setActs(ac||[]);setAsm(as||null);setAsmVotes(av||{});setAsmAtt(aa||[]);
  })()},[auth]);

  const sv=useCallback(async(k,d,fn)=>{fn(d);if(auth?.adminId)await db.s(`${k}-${auth.adminId}`,d)},[auth]);
  
  useEffect(()=>{if(vtimer<=0||!voting)return;const i=setInterval(()=>setVtimer(v=>{if(v<=1){clearInterval(i);setVoting(p=>p?{...p,ended:true}:null);return 0}return v-1}),1000);return()=>clearInterval(i)},[voting,vtimer]);

  // 最高管理帳號密碼保留 superadmin / admin123 不變
  const login=async(u,p,role)=>{
    if(role==="superadmin"){if(u==="superadmin"&&p==="admin123"){const a={role:"superadmin",username:u};setAuth(a);await db.s("auth",a);setPg("home");flash("歡迎回來，最高管理者")}else flash("帳號或密碼錯誤","err")}
    else if(role==="admin"){const all=await db.g("admins")||[];const f=all.find(a=>a.username===u&&a.password===p);
      if(f){const a={role:"admin",username:u,adminId:f.id,communityName:f.communityName,adminTitle:f.title};setAuth(a);await db.s("auth",a);setPg("home");flash(`歡迎，${f.title}`)}else flash("帳號或密碼錯誤","err")}
    else{const all=await db.g("admins")||[];for(const adm of all){const rs=await db.g(`res-${adm.id}`)||[];const f=rs.find(r=>r.username===u&&r.password===p);
      if(f){const a={role:"resident",username:u,adminId:adm.id,communityName:adm.communityName,residentName:f.name,unit:f.unit,residentId:f.id};setAuth(a);await db.s("auth",a);setPg("home");flash(`歡迎，${f.name}`);return}}flash("帳號或密碼錯誤","err")}};
  const logout=async()=>{setAuth(null);await db.d("auth");setPg("home");setHist([]);setDrawer(false)};

  if(!ready)return<div style={{...Z.shell,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/><div style={{textAlign:"center"}}><div style={{fontSize:56}}>🏢</div><div style={{fontFamily:"'Zen Maru Gothic'",fontSize:24,fontWeight:900,color:P.pri,marginTop:12}}>社區管理系統</div><div style={{fontSize:13,color:P.txt3,marginTop:8}}>載入中...</div></div></div>;
  if(!auth)return<LoginScreen onLogin={login}/>;

  const titles={home:"首頁",accounts:"帳號管理",comInfo:"社區資訊",finance:"財務概況",finSet:"財務設定",incRec:"收入記錄",expRec:"支出記錄",report:"月財報表",repair:"修繕概況",work:"工作報告",mtgList:"會議管理",actList:"活動管理",asmSet:"區權人大會",asmView:"大會總覽",rFin:"財務概況",rRep:"修繕概況",rMtg:"會議紀錄",rAct:"社區活動",rAsm:"區權人大會",rCom:"社區資訊",admDet:"管理者資訊"};
  const daysLeft=asm?.date?Math.ceil((new Date(asm.date)-new Date())/864e5):null;

  const ctx={pg,go,back,goHome,auth,flash,setModal,admins,setAdmins:v=>{setAdmins(v);db.s("admins",v)},
    residents,setResidents:v=>sv("res",v,setResidents),community,setCommunity:v=>sv("com",v,setCommunity),
    banks,setBanks:v=>sv("bnk",v,setBanks),inCats,setInCats:v=>sv("inc",v,setInCats),exCats,setExCats:v=>sv("exc",v,setExCats),
    txns,setTxns:v=>sv("txn",v,setTxns),repairs,setRepairs:v=>sv("rep",v,setRepairs),pendRep,setPendRep:v=>sv("prp",v,setPendRep),
    workLog,setWorkLog:v=>sv("wkl",v,setWorkLog),meetings,setMeetings:v=>sv("mtg",v,setMeetings),acts,setActs:v=>sv("act",v,setActs),
    asm,setAsm:v=>sv("asm",v,setAsm),asmVotes,setAsmVotes:v=>sv("asv",v,setAsmVotes),asmAtt,setAsmAtt:v=>sv("asa",v,setAsmAtt),
    voting,setVoting,vtimer,setVtimer};

  return(
  <div style={Z.shell}>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

    {asm&&daysLeft!==null&&daysLeft>=0&&daysLeft<=30&&<div style={Z.asmBnr}><span style={{opacity:.7}}>🏛</span> 第{asm.session}屆區權人大會 <span style={Z.asmBdg}>倒數{daysLeft}天</span></div>}

    {voting&&!voting.ended&&<div style={Z.voteBnr}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:4}}>
        <span style={{width:8,height:8,borderRadius:4,background:"#F87171",animation:"pulse 1.5s infinite"}}/><span style={{fontSize:12,fontWeight:700,letterSpacing:2,opacity:.8}}>投票進行中</span></div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:4}}>{voting.title}</div>
      <div style={{fontSize:36,fontWeight:900,fontVariantNumeric:"tabular-nums",letterSpacing:2}}>{Math.floor(vtimer/60)}:{String(vtimer%60).padStart(2,"0")}</div>
      <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:10}}>
        {[["#4ADE80","贊成",asmVotes[voting.id]?.yes||0],["#F87171","不贊成",asmVotes[voting.id]?.no||0],["#9CA3AF","廢票",asmVotes[voting.id]?.abstain||0]].map(([c,l,n])=>(
          <div key={l} style={{background:"rgba(255,255,255,.12)",borderRadius:10,padding:"6px 14px",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:10,height:10,borderRadius:5,background:c}}/><span style={{fontSize:13,opacity:.8}}>{l}</span><span style={{fontSize:18,fontWeight:900}}>{n}</span></div>))}
      </div>
    </div>}

    {asm&&(pg==="asmView"||pg==="asmSet"||pg==="rAsm")&&<div style={Z.attBar}>
      應到 <b>{community?.totalUnits||"—"}</b> <span style={{opacity:.3}}>│</span> 已報到 <b style={{color:P.grn,fontSize:18}}>{asmAtt.length}</b> <span style={{opacity:.3}}>│</span> 出席率 <b>{community?.totalUnits?Math.round(asmAtt.length/community.totalUnits*100):0}%</b>
    </div>}

    <header style={Z.hdr}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {hist.length>0&&<HBtn onClick={back}>‹</HBtn>}
        {auth.role==="admin"&&pg==="home"&&<HBtn onClick={()=>setDrawer(true)} style={{fontSize:22}}>☰</HBtn>}
        <div><div style={{fontSize:18,fontWeight:800,letterSpacing:.3}}>{titles[pg]||"社區管理"}</div>
          {pg==="home"&&auth.role!=="superadmin"&&<div style={{fontSize:12,opacity:.7}}>{auth.communityName}</div>}</div>
      </div>
      <button onClick={logout} style={Z.logBtn}>登出</button>
    </header>

    {drawer&&<><div style={Z.ov} onClick={()=>setDrawer(false)}/>
      <nav style={Z.dw}><div style={Z.dwH}><div style={{fontSize:12,color:P.txt2,letterSpacing:1}}>MANAGER</div><div style={{fontSize:20,fontWeight:800,color:P.pri,marginTop:2}}>{auth.adminTitle}</div><div style={{fontSize:14,color:P.txt2}}>{auth.communityName}</div></div>
        {[["accounts","帳號管理","👤"],["comInfo","社區資訊","🏢"],["finance","財務概況","💰"],["repair","修繕概況","🔧"],["work","工作報告","📝"],["mtgList","會議管理","📋"],["actList","活動管理","🎪"],["asmSet","區權人大會","🏛"]].map(([p,l,i])=>(
          <div key={p} onClick={()=>go(p)} style={{...Z.dwI,...(pg===p?{background:P.priXL,color:P.pri,fontWeight:700}:{})}}><span style={{fontSize:20,width:28,textAlign:"center"}}>{i}</span><span>{l}</span></div>))}
      </nav></>}

    {toast&&<div style={{...Z.toast,background:toast.t==="err"?P.red:P.pri}}>{toast.m}</div>}
    {modal&&<div style={Z.mBg} onClick={()=>setModal(null)}><div style={Z.mBox} onClick={e=>e.stopPropagation()}>{modal}</div></div>}

    <main style={Z.main}><PageRouter {...ctx}/></main>

    {auth.role!=="superadmin"&&<nav style={Z.nav}>
      {[["home","首頁","🏠"],[auth.role==="admin"?"finance":"rFin","財務","💰"],[auth.role==="admin"?"repair":"rRep","修繕","🔧"],[auth.role==="admin"?"mtgList":"rMtg","會議","📋"]].map(([p,l,i])=>(
        <button key={p} onClick={()=>goHome(p)} style={{...Z.navBtn,...(pg===p?{color:P.pri}:{})}}><span style={{fontSize:22}}>{i}</span><span style={{fontSize:11,fontWeight:pg===p?700:500}}>{l}</span>{pg===p&&<div style={{width:4,height:4,borderRadius:2,background:P.pri,marginTop:3}}/>}</button>))}
    </nav>}

    <style>{`@keyframes fadeUp{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.01)}}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}button:active{transform:scale(.97)!important}input:focus,select:focus,textarea:focus{border-color:${P.pri}!important;box-shadow:0 0 0 3px ${P.priL}!important;outline:none}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:${P.bdr};border-radius:3px}::placeholder{color:${P.txt3}}`}</style>
  </div>);
}

// ─── UI Components ───
const HBtn=({children,onClick,style={}})=><button onClick={onClick} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:24,cursor:"pointer",padding:"4px 10px",borderRadius:10,lineHeight:1,...style}}>{children}</button>;
const Card=({children,style={},onClick})=><div onClick={onClick} style={{...Z.card,...style,...(onClick?{cursor:"pointer"}:{})}}>{children}</div>;
const CT=({children,color,sub})=><div style={{marginBottom:sub?4:14}}><div style={{fontSize:17,fontWeight:800,color:color||P.pri,lineHeight:1.3}}>{children}</div>{sub&&<div style={{fontSize:13,color:P.txt2,marginTop:2}}>{sub}</div>}</div>;
const Lb=({children})=><label style={{fontSize:13,fontWeight:600,color:P.txt2,display:"block",marginBottom:3,marginTop:6}}>{children}</label>;
const Inp=(p)=><input{...p}style={{...Z.inp,...(p.style||{})}}/>;
const Sel=(p)=><select{...p}style={{...Z.sel,...(p.style||{})}}>{p.children}</select>;
const Txa=(p)=><textarea{...p}style={{...Z.txa,...(p.style||{})}}/>;
const Btn=({children,onClick,v="pri",full,sm,style={}})=>{const vs={pri:{background:P.pri,color:"#fff"},acc:{background:P.acc,color:"#fff"},red:{background:P.red,color:"#fff"},out:{background:"transparent",color:P.pri,border:`2px solid ${P.bdr}`},grn:{background:P.grn,color:"#fff"},ghost:{background:P.priXL,color:P.pri}};
  return<button onClick={onClick}style={{...Z.btn,...(vs[v]||vs.pri),...(full?{width:"100%"}:{}),...(sm?{padding:"9px 16px",fontSize:14,borderRadius:10}:{}),...style}}>{children}</button>};
const Grid2=({children})=><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{children}</div>;
const Empty=({icon,text,sub})=><div style={{textAlign:"center",padding:"48px 20px",color:P.txt2}}><div style={{fontSize:52,marginBottom:10,opacity:.8}}>{icon}</div><div style={{fontSize:16,fontWeight:600}}>{text}</div>{sub&&<div style={{fontSize:14,marginTop:4,color:P.txt3}}>{sub}</div>}</div>;
const Tag=({children,bg,color})=><span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:bg,color,marginRight:4}}>{children}</span>;
const Div=()=><div style={{borderBottom:`1px solid ${P.bdr}`,margin:"18px 0"}}/>;
const TRow=({label,value,last})=><div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",...(!last?{borderBottom:`1px solid ${P.bdr}`}:{})}}><span style={{color:P.txt2,fontSize:15}}>{label}</span><span style={{fontWeight:700,fontSize:15}}>{(value!=null?value:"—")}</span></div>;
const Tile=({icon,label,sub,onClick,badge,bg})=><div onClick={onClick} style={{...Z.tile,...(bg?{background:bg}:{})}}><div style={{fontSize:32,marginBottom:6}}>{icon}</div><div style={{fontSize:14,fontWeight:700,color:P.ink}}>{label}</div>{sub&&<div style={{fontSize:11,color:P.txt2,marginTop:2}}>{sub}</div>}{badge&&<div style={{position:"absolute",top:8,right:10,background:P.red,color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{badge}</div>}</div>;

// ─── Login ───
function LoginScreen({onLogin}){const[u,su]=useState(""),[p,sp]=useState(""),[r,sr]=useState("resident");
  return<div style={{...Z.shell,display:"flex",flexDirection:"column",justifyContent:"center",minHeight:"100vh",padding:28}}>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <div style={{textAlign:"center",marginBottom:40}}><div style={{width:80,height:80,borderRadius:24,background:`linear-gradient(135deg,${P.pri},${P.priD})`,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:40,marginBottom:16,boxShadow:"0 8px 24px rgba(61,107,79,.25)"}}>🏢</div>
      <div style={{fontFamily:"'Zen Maru Gothic'",fontSize:26,fontWeight:900,color:P.ink}}>社區管理系統</div><div style={{fontSize:13,color:P.txt3,marginTop:4,letterSpacing:1.5}}>COMMUNITY MANAGEMENT</div></div>
    <Card style={{padding:24}}><div style={{fontSize:13,fontWeight:600,color:P.txt2,marginBottom:12,letterSpacing:1}}>帳號登入</div>
      <Inp placeholder="請輸入帳號" value={u} onChange={e=>su(e.target.value)}/><Inp type="password" placeholder="請輸入密碼" value={p} onChange={e=>sp(e.target.value)}/>
      <Lb>登入身份</Lb><Sel value={r} onChange={e=>sr(e.target.value)}><option value="resident">住戶</option><option value="admin">管理者</option><option value="superadmin">最高管理者</option></Sel>
      <Btn full onClick={()=>onLogin(u,p,r)} style={{marginTop:12,padding:"16px",fontSize:17}}>登 入</Btn></Card>
    <DbStatus/>
    {/* 新增的 LoudHuang 監製字樣 */}
    <div style={{textAlign:"center", marginTop: 24, fontSize: 13, color: P.txt3, fontWeight: 600, letterSpacing: 1}}>LoudHuang監製</div>
    </div>}

// ─── DB Status ───
function DbStatus() {
  const [mode, setMode] = useState(window.dbMode || 'local');
  const [checking, setChecking] = useState(true);
  useEffect(() => {
    const check = async () => {
      await new Promise(r => setTimeout(r, 3000));
      if (window.firedb) {
        try {
          await window.firedb.collection('cms').doc('_ping').set({ t: Date.now() });
          setMode('cloud');
        } catch(e) { setMode('local'); }
      } else { setMode('local'); }
      setChecking(false);
    };
    check();
    window.onFirebaseReady = () => { setMode('cloud'); setChecking(false); };
  }, []);
  return React.createElement('div', {style:{textAlign:"center",marginTop:20,fontSize:13,color:P.txt3,display:"flex",alignItems:"center",justifyContent:"center",gap:8}},
    React.createElement('span', {style:{width:8,height:8,borderRadius:4,background:checking?"#D4882E":mode==="cloud"?"#3A8F5C":"#B5AFA8",display:"inline-block"}}),
    checking ? "連線中..." : mode === "cloud" ? "雲端同步已啟用" : "本機模式（僅此裝置）"
  );
}

function RepPg({repairs,setRepairs,pendRep,setPendRep,flash,setModal}){const[tab,setTab]=useState("active");

function RpForm({onSave,onClose}){const[f,sf]=useState({title:"",stages:3,stageNames:["規劃","施工","驗收"],stageAmounts:[0,0,0]});
  const sN=n=>{n=Math.max(3,Math.min(5,n));sf(p=>({...p,stages:n,stageNames:Array.from({length:n},(_,i)=>p.stageNames[i]||`階段${i+1}`),stageAmounts:Array.from({length:n},(_,i)=>p.stageAmounts[i]||0)}))};

    {f.photo?<img src={f.photo} alt="" style={{width:"100%",borderRadius:10}}/>:<><div style={{fontSize:36}}>📷</div><div style={{fontSize:14,color:P.txt2,marginTop:6}}>點擊上傳照片</div></>}

function AsmSetup(c){const{asm,setAsm,go,flash,residents,asmAtt,setAsmAtt,asmVotes,setAsmVotes,voting,setVoting,vtimer,setVtimer}=c;
  const[f,sf]=useState(asm||{date:"",checkInTime:"",startTime:"",finStart:"",finEnd:"",session:1,proposals:[{title:"",desc:"",id:uid()}]});
  const[ci,setCi]=useState("");const[sec,setSec]=useState("setup");
  const save=()=>{if(f.finStart&&f.finEnd){const d=(new Date(f.finEnd)-new Date(f.finStart))/864e5;if(d>365){flash("財報期間不得超過一年","err");return}}setAsm(f);flash("設定已儲存")};
  const chk=u=>{if(!residents.find(r=>r.unit===u)){flash("查無此戶別","err");return}if(asmAtt.includes(u)){flash("已報到","err");return}setAsmAtt([...asmAtt,u]);flash(`${u} 報到成功`)};
  const startV=p=>{const pid=p.id||p.title;setVoting({id:pid,title:p.title});setVtimer(180);setAsmVotes({...asmVotes,[pid]:{yes:0,no:0,abstain:0,voted:[]}});flash("投票開始（3分鐘）")};

  return<>{asm&&<div style={{display:"flex",gap:6,marginBottom:14,background:P.bgW,borderRadius:12,padding:4}}>
    {[["setup","設定"],["checkin","報到"],["vote","投票"],["view","總覽"]].map(([k,l])=><button key={k} onClick={()=>k==="view"?go("asmView"):setSec(k)} style={{...Z.tabBtn,...(sec===k?Z.tabAct:{})}}>{l}</button>)}</div>}

    {(sec==="setup"||!asm)&&<><Card style={{padding:22}}><CT sub="設定大會資訊">區權人大會</CT>
      <Lb>大會日期</Lb><Inp type="date" value={f.date||""} onChange={e=>sf({...f,date:e.target.value})}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><Lb>報到時間</Lb><Inp type="time" value={f.checkInTime||""} onChange={e=>sf({...f,checkInTime:e.target.value})}/></div><div><Lb>開始時間</Lb><Inp type="time" value={f.startTime||""} onChange={e=>sf({...f,startTime:e.target.value})}/></div></div>
      <Lb>第幾屆(上限60)</Lb><Inp type="number" min={1} max={60} value={f.session||""} onChange={e=>sf({...f,session:Math.min(60,+e.target.value||1)})}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><Lb>財報起始</Lb><Inp type="date" value={f.finStart||""} onChange={e=>sf({...f,finStart:e.target.value})}/></div><div><Lb>財報結束</Lb><Inp type="date" value={f.finEnd||""} onChange={e=>sf({...f,finEnd:e.target.value})}/></div></div></Card>
      <Card><CT sub={`${f.proposals?.length||0}/10案`}>提案管理</CT>{(f.proposals||[]).map((p,i)=><div key={i} style={{background:P.bg,padding:12,borderRadius:12,marginBottom:8,position:"relative"}}>
        <div style={{fontSize:12,fontWeight:700,color:P.acc,marginBottom:6}}>提案{i+1}</div><Inp placeholder="標題" value={p.title} onChange={e=>{const a=[...f.proposals];a[i]={...a[i],title:e.target.value};sf({...f,proposals:a})}}/><Txa placeholder="說明" value={p.desc} onChange={e=>{const a=[...f.proposals];a[i]={...a[i],desc:e.target.value};sf({...f,proposals:a})}}/>
        {f.proposals.length>1&&<button onClick={()=>sf({...f,proposals:f.proposals.filter((_,j)=>j!==i)})} style={{...Z.iBtn,position:"absolute",top:8,right:8}}>✕</button>}</div>)}
        {(f.proposals?.length||0)<10&&<Btn full v="ghost" onClick={()=>sf({...f,proposals:[...(f.proposals||[]),{title:"",desc:"",id:uid()}]})}>＋ 新增提案</Btn>}</Card>
      <Btn full onClick={save} style={{marginBottom:14,padding:16,fontSize:17}}>儲存大會設定</Btn></>}

    {sec==="checkin"&&asm&&<><Card style={{textAlign:"center",padding:24}}><div style={{fontSize:48,fontWeight:900,color:P.pri}}>{asmAtt.length}</div><div style={{fontSize:14,color:P.txt2}}>已報到</div>
      <div style={{marginTop:10,display:"flex",gap:8,justifyContent:"center"}}><Inp placeholder="輸入戶別" value={ci} onChange={e=>setCi(e.target.value)} style={{maxWidth:200,textAlign:"center",marginBottom:0}}/><Btn onClick={()=>{chk(ci);setCi("")}}>報到</Btn></div></Card>
      {asmAtt.length>0&&<Card><CT sub="已完成報到">報到名單</CT><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{asmAtt.map(u=><Tag key={u} bg={P.grnL} color={P.grn}>{u}</Tag>)}</div></Card>}</>}

    {sec==="vote"&&asm&&<>{(asm.proposals||[]).map((p,i)=>{const pid=p.id||p.title,v=asmVotes[pid],active=voting?.id===pid&&!voting?.ended,ended=voting?.id===pid&&voting?.ended;
      return<Card key={i} style={{borderLeft:active?`4px solid ${P.acc}`:ended?`4px solid ${P.grn}`:"none"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><Tag bg={P.accL} color={P.acc}>提案{i+1}</Tag><div style={{fontWeight:700,fontSize:16,marginTop:6}}>{p.title}</div>{p.desc&&<div style={{fontSize:13,color:P.txt2,marginTop:4}}>{p.desc}</div>}</div></div>

        {active&&<div style={{marginTop:10,textAlign:"center",fontSize:18,fontWeight:800,color:P.acc}}>投票中 {Math.floor(vtimer/60)}:{String(vtimer%60).padStart(2,"0")}</div>}
        {ended&&v&&<div style={{marginTop:10,textAlign:"center"}}><Tag bg={v.yes>v.no?P.grnL:P.redL} color={v.yes>v.no?P.grn:P.red}>{v.yes>v.no?"✓ 通過":"✕ 未通過"}</Tag></div>}
        {!active&&!ended&&<Btn full onClick={()=>startV(p)} style={{marginTop:12}}>🗳 開始投票（倒數3分鐘）</Btn>}</Card>})}</>}</>}

function AsmView({asm,community,auth,txns}){if(!asm)return<Empty icon="🏛" text="尚未設定"/>;
  const rTx=txns.filter(t=>t.date>=(asm.finStart||"")&&t.date<=(asm.finEnd||""));const months=[];if(asm.finStart&&asm.finEnd){let d=new Date(asm.finStart);const e=new Date(asm.finEnd);while(d<=e){months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);d.setMonth(d.getMonth()+1)}}
  const ms=(m,t)=>rTx.filter(x=>x.type===t&&x.date?.startsWith(m)).reduce((s,x)=>s+(x.amount||0),0);const tI=rTx.filter(t=>t.type==="income").reduce((s,t)=>s+(t.amount||0),0),tE=rTx.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.amount||0),0);

      <tbody>{months.map(m=>{const i=ms(m,"income"),e=ms(m,"expense");return<tr key={m} style={{borderBottom:`1px solid ${P.bdr}`}}><td style={Z.td}>{m}</td><td style={{...Z.td,color:P.grn}}>{i?`$${i.toLocaleString()}`:"-"}</td><td style={{...Z.td,color:P.red}}>{e?`$${e.toLocaleString()}`:"-"}</td><td style={{...Z.td,fontWeight:700}}>${(i-e).toLocaleString()}</td></tr>})}</tbody>

function RCom({community}){if(!community)return<Empty icon="🏢" text="尚無資訊"/>;return<Card style={{padding:22}}><div style={{fontSize:22,fontWeight:900,color:P.pri,marginBottom:14}}>{community.name}</div><TRow label="總戶數" value={community.totalUnits}/><TRow label="店面" value={community.shops}/><TRow label="戶數" value={community.units}/><TRow label="承租" value={community.renters}/><TRow label="總坪" value={community.totalPing} last/>{community.note&&<div style={{marginTop:14,fontSize:14,color:P.txt2,background:P.bg,padding:12,borderRadius:10}}>備註：{community.note}</div>}</Card>}
function RFin({txns}){const iT=txns.filter(t=>t.type==="income").reduce((s,t)=>s+(t.amount||0),0),eT=txns.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.amount||0),0);
  return<><Card style={{textAlign:"center",padding:24}}><div style={{fontSize:12,color:P.txt3}}>社區總結餘</div><div style={{fontSize:32,fontWeight:900,color:P.pri,marginTop:4}}>${(iT-eT).toLocaleString()}</div><div style={{display:"flex",justifyContent:"center",gap:24,marginTop:14}}><div><div style={{fontSize:12,color:P.txt3}}>收入</div><div style={{fontSize:17,fontWeight:700,color:P.grn}}>+${iT.toLocaleString()}</div></div><div><div style={{fontSize:12,color:P.txt3}}>支出</div><div style={{fontSize:17,fontWeight:700,color:P.red}}>-${eT.toLocaleString()}</div></div></div></Card>
    <div style={{fontSize:16,fontWeight:700,margin:"14px 0 8px"}}>近期記錄</div>{txns.slice(0,20).map(t=><Card key={t.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:600}}>{t.cat}</div><div style={{fontSize:12,color:P.txt3}}>{fmt(t.date)}</div></div><span style={{fontSize:17,fontWeight:800,color:t.type==="income"?P.grn:P.red}}>{t.type==="income"?"+":"-"}${t.amount?.toLocaleString()}</span></div></Card>)}{!txns.length&&<Empty icon="💰" text="尚無記錄"/>}</>}
function RRep({repairs,pendRep}){return<>{repairs.length>0&&<div style={{fontSize:16,fontWeight:700,marginBottom:10}}>修繕進度</div>}{repairs.map(r=>{const pct=r.stages>0?((r.currentStage||0)/r.stages)*100:0;return<Card key={r.id}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontWeight:700}}>{r.title}</span><Tag bg={pct>=100?P.grnL:P.ornL} color={pct>=100?P.grn:P.orn}>{Math.round(pct)}%</Tag></div><div style={{height:8,borderRadius:4,background:P.bdr,overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,width:`${pct}%`,background:`linear-gradient(90deg,${P.pri},${P.grn})`,transition:"width .5s"}}/></div></Card>})}{!repairs.length&&<Empty icon="🔧" text="無修繕中"/>}{pendRep.length>0&&<div style={{fontSize:16,fontWeight:700,margin:"16px 0 10px"}}>待修繕</div>}{pendRep.map(p=><Card key={p.id}>{p.photo&&<img src={p.photo} alt="" style={{width:"100%",borderRadius:14,marginBottom:10}}/>}<div style={{fontWeight:700}}>{p.title}</div>{p.note&&<div style={{fontSize:13,color:P.txt2}}>{p.note}</div>}</Card>)}</>}
function RMtg({meetings}){return<>{meetings.map(m=><Card key={m.id}><div style={{fontWeight:700,fontSize:16}}>{m.title}</div><div style={{fontSize:12,color:P.txt3,marginTop:2}}>{fmt(m.createdAt)}</div>{(m.entries||[]).map((t,i)=><div key={i} style={{background:P.bg,padding:10,borderRadius:10,marginTop:8}}><div style={{fontWeight:600,fontSize:14}}>議題{i+1}：{t.title}</div>{t.desc&&<div style={{fontSize:13,color:P.txt2,marginTop:2}}>{t.desc}</div>}</div>)}</Card>)}{!meetings.length&&<Empty icon="📋" text="尚無會議"/>}</>}
function RAct({acts}){return<>{acts.map(a=><Card key={a.id}><div style={{fontWeight:700,fontSize:16}}>{a.title}</div><div style={{fontSize:12,color:P.txt3,marginTop:2}}>{fmt(a.createdAt)}</div>{(a.entries||[]).map((t,i)=><div key={i} style={{background:P.bg,padding:10,borderRadius:10,marginTop:8}}><div style={{fontWeight:600,fontSize:14}}>{t.title}</div>{t.desc&&<div style={{fontSize:13,color:P.txt2,marginTop:2}}>{t.desc}</div>}</div>)}</Card>)}{!acts.length&&<Empty icon="🎪" text="尚無活動"/>}</>}

// ─── Resident Assembly (Direct voting, no QR) ───
function RAsm({asm,community,auth,asmVotes,setAsmVotes,asmAtt,voting,vtimer,flash}){
  if(!asm)return<Empty icon="🏛" text="尚未設定區權人大會"/>;
  const isAtt=asmAtt.includes(auth.unit);
  const vote=(pid,v)=>{if(!isAtt){flash("您尚未報到，請洽管理者","err");return}const cur=asmVotes[pid]||{yes:0,no:0,abstain:0,voted:[]};if(cur.voted?.includes(auth.unit)){flash("您已投過票","err");return}setAsmVotes({...asmVotes,[pid]:{...cur,[v]:(cur[v]||0)+1,voted:[...(cur.voted||[]),auth.unit]}});flash("投票成功！")};

  return<><Card style={{background:`linear-gradient(135deg,${P.pri},${P.priD})`,color:"#fff",textAlign:"center",border:"none",padding:24}}>
    <div style={{fontSize:14,opacity:.7}}>第{asm.session}屆</div><div style={{fontSize:22,fontWeight:900,marginTop:4}}>{community?.name||auth.communityName}</div><div style={{fontSize:18,fontWeight:700}}>區權人大會</div><div style={{fontSize:14,opacity:.7,marginTop:6}}>{fmt(asm.date)} {asm.startTime}</div>
    <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:14}}>
      <div style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"6px 16px"}}><div style={{fontSize:12,opacity:.7}}>報到</div><div style={{fontSize:20,fontWeight:900}}>{asmAtt.length}</div></div>
      <div style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"6px 16px"}}><div style={{fontSize:12,opacity:.7}}>您</div><div style={{fontSize:14,fontWeight:700}}>{isAtt?"✅ 已報到":"⏳ 待報到"}</div></div></div></Card>

    {!isAtt&&<Card style={{background:P.ornL,border:`2px solid ${P.orn}`}}><div style={{textAlign:"center",fontSize:15,fontWeight:700,color:P.orn}}>⏳ 尚未報到，請至管理者處辦理</div></Card>}

    <div style={{fontSize:17,fontWeight:800,margin:"14px 0 10px"}}>提案與投票</div>
    {(asm.proposals||[]).map((p,i)=>{const pid=p.id||p.title,v=asmVotes[pid],active=voting?.id===pid&&!voting?.ended,ended=voting?.id===pid&&voting?.ended,voted=v?.voted?.includes(auth.unit);
      return<Card key={i} style={{borderLeft:active?`4px solid ${P.acc}`:ended?`4px solid ${P.grn}`:"none",...(active?{animation:"breathe 2s infinite"}:{})}}>
        <Tag bg={P.accL} color={P.acc}>提案{i+1}</Tag><div style={{fontWeight:700,fontSize:17,marginTop:6}}>{p.title}</div>{p.desc&&<div style={{fontSize:14,color:P.txt2,marginTop:4}}>{p.desc}</div>}

        {active&&!voted&&isAtt&&<div style={{marginTop:16}}><div style={{fontSize:13,color:P.txt2,textAlign:"center",marginBottom:8}}>請投下您的一票</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>vote(pid,"yes")} style={{...Z.vBtn,background:P.grn}}><span style={{fontSize:24}}>👍</span><span>贊成</span></button>
            <button onClick={()=>vote(pid,"no")} style={{...Z.vBtn,background:P.red}}><span style={{fontSize:24}}>👎</span><span>不贊成</span></button>
            <button onClick={()=>vote(pid,"abstain")} style={{...Z.vBtn,background:"#888"}}><span style={{fontSize:18}}>—</span><span>廢票</span></button></div></div>}

        {voted&&<div style={{marginTop:12,textAlign:"center",padding:10,background:P.grnL,borderRadius:10,color:P.grn,fontWeight:700}}>✅ 已完成投票</div>}
        {active&&!isAtt&&<div style={{marginTop:12,textAlign:"center",padding:10,background:P.ornL,borderRadius:10,color:P.orn,fontWeight:600,fontSize:14}}>需完成報到才能投票</div>}

        {v&&<div style={{display:"flex",gap:8,marginTop:12}}>{[["贊成",v.yes,P.grn],["不贊成",v.no,P.red],["廢票",v.abstain,P.txt3]].map(([l,n,c])=><div key={l} style={{flex:1,textAlign:"center",background:P.bg,borderRadius:10,padding:"8px 4px"}}><div style={{fontSize:22,fontWeight:900,color:c}}>{n}</div><div style={{fontSize:12,color:P.txt3}}>{l}</div></div>)}</div>}
        {ended&&v&&<div style={{textAlign:"center",marginTop:10}}><Tag bg={v.yes>v.no?P.grnL:P.redL} color={v.yes>v.no?P.grn:P.red}>{v.yes>v.no?"✓ 通過":"✕ 未通過"}（{v.yes+v.no+v.abstain}票）</Tag></div>}
        {!active&&!ended&&!v&&<div style={{marginTop:10,fontSize:13,color:P.txt3,textAlign:"center"}}>尚未開始投票</div>}
      </Card>})}</>}

// ─── Styles ───
const Z={
  shell:{fontFamily:"'Noto Sans JP','Zen Maru Gothic',sans-serif",background:P.bg,minHeight:"100vh",color:P.txt,fontSize:16,lineHeight:1.6,maxWidth:480,margin:"0 auto",position:"relative",paddingBottom:80},
  hdr:{background:`linear-gradient(135deg,${P.pri},${P.priD})`,color:"#fff",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100},
  logBtn:{background:"rgba(255,255,255,.12)",border:"none",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",padding:"6px 14px",borderRadius:8},
  main:{padding:"14px 14px 20px"},
  card:{background:P.card,borderRadius:16,padding:18,marginBottom:10,boxShadow:P.shd,border:`1px solid ${P.bdr}`},
  inp:{width:"100%",padding:"13px 16px",borderRadius:12,border:`1.5px solid ${P.bdr}`,fontSize:16,fontFamily:"inherit",boxSizing:"border-box",marginBottom:8,background:"#FAFAF8",outline:"none",transition:"border .2s,box-shadow .2s"},
  sel:{width:"100%",padding:"13px 16px",borderRadius:12,border:`1.5px solid ${P.bdr}`,fontSize:16,fontFamily:"inherit",boxSizing:"border-box",marginBottom:8,background:"#FAFAF8",outline:"none",appearance:"none"},
  txa:{width:"100%",padding:"13px 16px",borderRadius:12,border:`1.5px solid ${P.bdr}`,fontSize:16,fontFamily:"inherit",boxSizing:"border-box",marginBottom:8,background:"#FAFAF8",outline:"none",minHeight:70,resize:"vertical"},
  btn:{padding:"14px 22px",borderRadius:12,border:"none",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6},
  tile:{background:P.card,borderRadius:18,padding:"22px 14px",textAlign:"center",boxShadow:P.shd,border:`1px solid ${P.bdr}`,cursor:"pointer",position:"relative"},
  nav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:P.card,borderTop:`1px solid ${P.bdr}`,display:"flex",justifyContent:"space-around",padding:"6px 0 12px",zIndex:200},
  navBtn:{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",border:"none",background:"none",fontFamily:"inherit",padding:"4px 12px",color:P.txt3,position:"relative"},
  ov:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.25)",zIndex:240},
  dw:{position:"fixed",top:0,left:0,bottom:0,width:280,background:P.card,zIndex:250,boxShadow:"4px 0 24px rgba(0,0,0,.1)",overflowY:"auto",animation:"slideIn .25s ease-out"},
  dwH:{padding:"28px 22px 20px",borderBottom:`1px solid ${P.bdr}`},
  dwI:{padding:"14px 22px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",borderBottom:`1px solid ${P.bdr}`,fontSize:15,fontWeight:500,color:P.txt},
  toast:{position:"fixed",top:76,left:"50%",transform:"translateX(-50%)",color:"#fff",padding:"12px 28px",borderRadius:14,zIndex:999,fontSize:15,fontWeight:700,boxShadow:"0 4px 20px rgba(0,0,0,.2)",animation:"fadeUp .3s",whiteSpace:"nowrap"},
  mBg:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16},
  mBox:{background:P.card,borderRadius:22,padding:24,width:"100%",maxWidth:440,maxHeight:"85vh",overflowY:"auto"},
  iBtn:{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:4,opacity:.6},
  tabBtn:{flex:1,padding:"10px 8px",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",background:"transparent",color:P.txt2,fontFamily:"inherit"},
  tabAct:{background:P.card,color:P.pri,boxShadow:"0 1px 4px rgba(0,0,0,.06)"},
  th:{padding:"10px 8px",textAlign:"right",borderBottom:`2px solid ${P.pri}`,fontSize:13,fontWeight:700},
  td:{padding:"10px 8px",textAlign:"right",fontSize:13},
  asmBnr:{background:"linear-gradient(90deg,#F7E176,#F0C75E)",color:"#5A4200",textAlign:"center",padding:"10px 16px",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8},
  asmBdg:{background:"rgba(0,0,0,.1)",padding:"2px 10px",borderRadius:20,fontWeight:800},
  voteBnr:{background:"linear-gradient(135deg,#0F172A,#1E293B)",color:"#fff",padding:"18px 16px",textAlign:"center",position:"relative",overflow:"hidden"},
  attBar:{background:P.priL,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:14,fontWeight:600,color:P.pri},
  vBtn:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"16px 8px",borderRadius:14,border:"none",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"},
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
